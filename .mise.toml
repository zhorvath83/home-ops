[env]
JUST_UNSTABLE = "1"
KUBECONFIG = '{{config_root}}/kubeconfig'
TALOSCONFIG = '{{config_root}}/talosconfig'
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
# Talos + Kubernetes versions consumed by kubernetes/talos templates and recipes.
# renovate: datasource=custom.talos-factory depName=siderolabs/talos
TALOS_VERSION = "v1.13.2"
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
KUBERNETES_VERSION = "v1.36.1"
# Path to the NAS-share mount helper used by the openwrt/omv recipes.
# Override per-environment if the personal scripts repo lives elsewhere.
NAS_MOUNT_SCRIPT = '{{get_env(name="HOME")}}/Projects/personal/my-scripts-and-configs/macOS/btt-scripts/nas-share-mount.sh'

[settings]
pipx.uvx = true

[tools]
# Core CLI tooling
talosctl = "1.13.2"
kubectl = "1.36.1"
helm = "4.2.0"
helmfile = "1.5.2"
flux2 = "2.8.8"
just = "1.51.0"

# Templating + secrets
"aqua:mitsuhiko/minijinja" = "2.20.0"
"1password-cli" = "2.34.0"

# YAML/JSON tooling
yq = "4.53.2"
jq = "1.8.1"

# UX
gum = "0.17.0"

# Hooks
pre-commit = "4.6.0"

# Terraform
terraform = "1.15.4"

# Linters / formatters / auditors
"aqua:google/yamlfmt" = "0.17.2"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:koalaman/shellcheck" = "0.10.0"
"aqua:zricethezav/gitleaks" = "8.30.1"
"aqua:terraform-linters/tflint" = "0.62.1"
"npm:markdownlint-cli2" = "0.22.1"
"pipx:yamllint" = "1.38.0"
zizmor = "1.25.2"

# Python tooling (pipx backend)
"pipx:flux-local" = "latest"
"pipx:ansible" = "latest"
"pipx:ansible-core" = "latest"
