[env]
JUST_UNSTABLE = "1"
KUBECONFIG = '{{config_root}}/kubeconfig'
TALOSCONFIG = '{{config_root}}/talosconfig'
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"

[settings]
pipx.uvx = true

[tools]
# Core CLI tooling
talosctl = "1.10.6"
kubectl = "1.36.1"
helm = "3.18.2"
helmfile = "1.1.0"
flux = "2.7.2"
just = "1.45.0"

# Templating + secrets
minijinja-cli = "2.13.0"
sops = "3.10.2"
age = "1.2.1"
"1password-cli" = "2.32.0"

# YAML/JSON tooling
yq = "4.47.2"
jq = "1.7.1"

# UX
gum = "0.16.0"

# Hooks
pre-commit = "4.0.1"

# Terraform
terraform = "1.10.5"

# Ansible (OMV deploy — bare metal install playbook)
"pipx:ansible" = "latest"
"pipx:ansible-core" = "latest"
