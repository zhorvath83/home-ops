[env]
JUST_UNSTABLE = "1"
KUBECONFIG = '{{config_root}}/kubeconfig'
TALOSCONFIG = '{{config_root}}/talosconfig'
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
GITHUB_TOKEN = "{{ exec(command='gh auth token') | trim }}"
# Talos + Kubernetes versions consumed by kubernetes/talos templates and recipes.
# renovate: datasource=custom.talos-factory depName=siderolabs/talos
TALOS_VERSION = "v1.13.5"
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
KUBERNETES_VERSION = "v1.36.2"
# Path to the NAS-share mount helper used by the openwrt/omv recipes.
# Override per-environment if the personal scripts repo lives elsewhere.
NAS_MOUNT_SCRIPT = '{{get_env(name="HOME")}}/Projects/personal/my-scripts-and-configs/macOS/btt-scripts/nas-share-mount.sh'

[settings]
pipx.uvx = true

[tools]
# Core CLI tooling
"aqua:siderolabs/talos" = "1.13.5"
"aqua:helm/helm" = "4.2.2"
"aqua:helmfile/helmfile" = "1.6.0"
"aqua:fluxcd/flux2" = "2.9.0"
"aqua:casey/just" = "1.55.1"

# Kubernetes — bare name kept: aqua 3-part path (kubernetes/kubernetes/kubectl) breaks Renovate
kubectl = "1.36.2"

# Observability (Cilium Hubble) — CLI matches cluster cilium minor; -P auto port-forwards to hubble-relay
"aqua:cilium/hubble" = "1.19.4"

# Templating + secrets
"aqua:mitsuhiko/minijinja" = "2.21.0"

# YAML/JSON tooling
"aqua:mikefarah/yq" = "4.53.3"
"aqua:jqlang/jq" = "1.8.1"

# UX
"aqua:charmbracelet/gum" = "0.17.0"

# Hooks
"aqua:pre-commit/pre-commit" = "4.6.0"

# Terraform
"aqua:hashicorp/terraform" = "1.15.7"

# Linters / formatters / auditors
"aqua:google/yamlfmt" = "0.21.0"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:zricethezav/gitleaks" = "8.30.1"
"aqua:terraform-linters/tflint" = "0.63.1"
"npm:markdownlint-cli2" = "0.23.0"
"pipx:yamllint" = "1.38.0"
"aqua:zizmorcore/zizmor" = "1.26.1"

# Python tooling (pipx backend)
"pipx:flux-local" = "8.4.0"
"pipx:ansible" = "14.1.0"
"pipx:ansible-core" = "2.21.1"
