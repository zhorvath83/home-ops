---
fail_fast: false
repos:
  - repo: local
    hooks:
      - id: yamlfmt
        name: yamlfmt
        language: system
        entry: yamlfmt
        types:
          - yaml
        exclude: kubernetes/apps/default/homepage/app/config/settings\.yaml
      - id: yamllint
        name: yamllint
        language: system
        entry: yamllint --config-file .yamllint.yaml
        types:
          - yaml
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck
        types:
          - shell
      - id: actionlint
        name: actionlint
        language: system
        entry: actionlint
        files: \.github/workflows/
        types:
          - yaml
      - id: gitleaks
        name: gitleaks
        language: system
        entry: gitleaks protect --staged
        pass_filenames: false
      - id: just-fmt
        name: just-fmt
        language: system
        entry: bash -c 'just --fmt && find . -name "mod.just" -not -path "./.git/*" -not -path "./.claude/*" -exec just --justfile {} --fmt \;'
        pass_filenames: false
        always_run: true
      - id: mise-fmt
        name: mise-fmt
        language: system
        entry: mise fmt
        pass_filenames: false
        files: '\.mise\.toml$'
      - id: mise-lock
        name: mise-lock
        language: system
        entry: mise lock
        pass_filenames: false
        files: '\.mise\.toml$'
      - id: zizmor
        name: zizmor
        language: system
        entry: zizmor --offline
        files: \.github/workflows/
        types: [yaml]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: fix-byte-order-marker
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: remove-crlf
        exclude: mta_sts_policy.tpl
      - id: remove-tabs
  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
  - repo: https://github.com/k8s-at-home/sops-pre-commit
    rev: v2.1.1
    hooks:
      - id: forbid-secrets
