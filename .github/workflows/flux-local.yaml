---
name: Flux Local

on:
  pull_request:
    branches:
      - main
    paths:
      - "kubernetes/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flux Local - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flux Local - Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Run flux-local test
        run: flux-local test --enable-helm --path kubernetes/flux/cluster -A

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flux Local - Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        kind:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: pull
          persist-credentials: false
          sparse-checkout: kubernetes/

      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: default
          persist-credentials: false
          sparse-checkout: kubernetes/

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Run flux-local diff
        id: diff
        env:
          KIND: ${{ matrix.kind }}
        run: |
          {
            echo 'diff<<EOF'
            flux-local diff "$KIND" \
              --path ./pull/kubernetes/flux/cluster \
              --path-orig ./default/kubernetes/flux/cluster \
              --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart" \
              --limit-bytes 10000 \
              --all-namespaces \
              --sources "flux-system" \
              || true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Add or Update Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DIFF: ${{ steps.diff.outputs.diff }}
          KIND: ${{ matrix.kind }}
        with:
          script: |
            const { DIFF, KIND } = process.env;
            const label = { helmrelease: "HelmRelease", kustomization: "Kustomization" }[KIND];
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = `<!-- Sticky Pull Request Comment${issue_number}/kubernetes/${KIND} -->`;
            const body = [
              marker,
              `<details open><summary>${label} diff</summary>`,
              "",
              "```diff",
              DIFF,
              "```",
              "",
              "</details>",
              "",
              `<sub>Generated for [\`${sha.slice(0, 7)}\`](${context.payload.pull_request.html_url}/commits/${sha})</sub>`,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  success:
    if: ${{ !cancelled() }}
    needs:
      - test
      - diff
    name: Flux Local - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
