---
name: "Update Cloudflare Networks"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
env:
  CIDRGROUP_FILE: kubernetes/apps/networking/cloudflare-tunnel/app/ciliumcidrgroup.yaml

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cloudflare-networks:
    name: Update Cloudflare Networks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ruamel.yaml

      - name: Update Cloudflare Networks
        id: update
        run: |
          OUTPUT=$(python .github/scripts/update_cloudflare_networks.py)
          {
            echo "changes<<EOF"
            echo "${OUTPUT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          branch: github-action/update-cloudflare-networks
          delete-branch: true
          title: "chore(github-action): update cloudflare networks"
          signoff: true
          commit-message: "chore(github-action): update cloudflare networks"
          body: |
            Update Cloudflare networks in CiliumCIDRGroup referenced by the
            cloudflare-tunnel CiliumNetworkPolicy.

            **Updated files:**
            - `${{ env.CIDRGROUP_FILE }}` - CiliumCIDRGroup `spec.externalCIDRs`

            **Changes:**
            ```
            ${{ steps.update.outputs.changes }}
            ```

            Source: https://api.cloudflare.com/client/v4/ips
          labels: |
            renovate/github-action

      - name: Debug Git Diff
        if: failure()
        run: |-
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git diff --cached --name-status
          git status
