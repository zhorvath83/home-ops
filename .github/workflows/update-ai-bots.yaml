---
name: "Update AI Bot List"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
env:
  BOT_LIST_FILE: kubernetes/apps/networking/envoy-gateway/config/resources/block-user-agents.lua

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ai-bots:
    name: Update AI Bot List
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Update AI Bots
        id: update
        run: |
          OUTPUT=$(python .github/scripts/update-ai-bots.py)
          {
            echo "changes<<EOF"
            echo "${OUTPUT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          branch: github-action/update-ai-bots
          delete-branch: true
          title: "chore(github-action): update AI bot list"
          signoff: true
          commit-message: "chore(github-action): update AI bot list"
          body: |
            Update the AI bot blocklist in Envoy Gateway based on the latest data from ai-robots-txt.

            **Updated files:**
            - `${{ env.BOT_LIST_FILE }}`

            **Changes:**
            ```
            ${{ steps.update.outputs.changes }}
            ```

            Source: https://github.com/ai-robots-txt/ai.robots.txt
          labels: |
            automated

      - name: Debug Git Diff
        if: failure()
        run: |-
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git diff --name-status || true
          git status || true
