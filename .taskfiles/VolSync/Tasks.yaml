---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  destinationTemplate: "{{.ROOT_DIR}}/.taskfiles/VolSync/ReplicationDestination.tmpl.yaml"
  wipeJobTemplate: "{{.ROOT_DIR}}/.taskfiles/VolSync/WipeJob.tmpl.yaml"
  waitForJobScript: "{{.ROOT_DIR}}/.taskfiles/VolSync/wait-for-job.sh"
  ts: '{{now | date "150405"}}'

env:
  rsrc: '{{.rsrc}}'
  app: '{{.app}}'
  controller: '{{.controller}}'
  replicas: '{{.replicas}}'
  namespace: '{{.namespace}}'
  claim: '{{.claim}}'
  ts: '{{.ts}}'
  kustomization: '{{.kustomization}}'
  previous: '{{.previous}}'
  id: '{{.id}}'

tasks:

  list:
    desc: List Kopia snapshots for a given ReplicationSource identity (ex. task vs:list rsrc=actual [namespace=default])
    silent: true
    cmds:
      - |
        kubectl -n {{.kopiaNamespace}} exec deploy/kopia -- \
          kopia snapshot list "{{.rsrc}}@{{.namespace}}:{{.sourcePath}}" \
            --all \
            --manifest-id \
            --json \
          | jq -r '
              def human_bytes:
                if . >= 1073741824 then ((. / 1073741824 * 10 | floor) / 10 | tostring) + " GiB"
                elif . >= 1048576 then ((. / 1048576 * 10 | floor) / 10 | tostring) + " MiB"
                elif . >= 1024 then ((. / 1024 * 10 | floor) / 10 | tostring) + " KiB"
                else tostring + " B"
                end;
              [
                ["TIME (UTC)", "SNAPSHOT", "SIZE", "FILES", "DIRS", "RETENTION"],
                (
                  sort_by(.startTime) | reverse | map([
                    (.startTime | sub("\\.[0-9]+Z$"; "Z") | gsub("T"; " ")),
                    .id,
                    ((.rootEntry.summ.size // .stats.totalSize // 0) | human_bytes),
                    ((.rootEntry.summ.files // .stats.fileCount // 0) | tostring),
                    ((.rootEntry.summ.dirs // .stats.dirCount // 0) | tostring),
                    ((.retentionReason // []) | join(","))
                  ])[]
                )
              ]
              | .[]
              | @tsv' \
          | column -t -s $'\t'
    vars:
      rsrc: '{{ or .rsrc (fail "ReplicationSource `rsrc` is required") }}'
      namespace: '{{.namespace | default "default"}}'
      kopiaNamespace: '{{.kopiaNamespace | default "system"}}'
      sourcePath: '{{.sourcePath | default "/data"}}'
    preconditions:
      - sh: command -v jq >/dev/null 2>&1
        msg: jq is required for formatting snapshot output
      - sh: command -v column >/dev/null 2>&1
        msg: column is required for tabular snapshot output
      - sh: kubectl -n {{.kopiaNamespace}} get deploy/kopia >/dev/null 2>&1
        msg: "Kopia UI deployment not found in namespace '{{.kopiaNamespace}}'"

  snapshot:
    desc: Trigger a Kopia ReplicationSource backup (ex. task vs:snapshot rsrc=actual [namespace=default])
    cmds:
      - |
        kubectl -n {{.namespace}} patch replicationsources {{.rsrc}} --type merge \
          -p '{"spec":{"trigger":{"manual":"{{.ts}}"}}}'
      - |
        while true; do
          last_manual_sync="$(kubectl -n {{.namespace}} get replicationsource {{.rsrc}} -o jsonpath='{.status.lastManualSync}' 2>/dev/null)"
          if [ "${last_manual_sync}" = "{{.ts}}" ]; then
            break
          fi
          sleep 2
        done
      - kubectl -n {{.namespace}} get replicationsource {{.rsrc}} -o yaml
    vars:
      rsrc: '{{ or .rsrc (fail "ReplicationSource `rsrc` is required") }}'
      namespace: '{{.namespace | default "default"}}'
    preconditions:
      - sh: kubectl -n {{.namespace}} get replicationsources {{.rsrc}}
        msg: "ReplicationSource '{{.rsrc}}' not found in namespace '{{.namespace}}'"

  restore:
    desc: Restore a PVC from Kopia backup (ex. task vs:restore rsrc=actual [namespace=default] [id=<snapshot-id>])
    cmds:
      - defer:
          task: restore-resume-app
          vars:
            rsrc: '{{.rsrc}}'
            app: '{{.app}}'
            namespace: '{{.namespace}}'
            kustomization: '{{.kustomization}}'
            controller: '{{.controller}}'
            replicas: '{{.replicas}}'
      - task: restore-suspend-app
        vars:
          rsrc: '{{.rsrc}}'
          app: '{{.app}}'
          namespace: '{{.namespace}}'
          kustomization: '{{.kustomization}}'
          controller: '{{.controller}}'
          replicas: '{{.replicas}}'
      - task: restore-wipe-job
        vars:
          rsrc: '{{.rsrc}}'
          namespace: '{{.namespace}}'
          claim: '{{.claim}}'
          ts: '{{.ts}}'
      - task: restore-volsync-job
        vars:
          rsrc: '{{.rsrc}}'
          namespace: '{{.namespace}}'
          claim: '{{.claim}}'
          ts: '{{.ts}}'
          previous: '{{.previous}}'
    vars:
      rsrc: '{{ or .rsrc (fail "Variable `rsrc` is required") }}'
      namespace: '{{.namespace | default "default"}}'
      kopiaNamespace: '{{.kopiaNamespace | default "system"}}'
      sourcePath: '{{.sourcePath | default "/data"}}'
      # 1) Query to find the Flux Kustomization associated with the ReplicationSource (rsrc)
      # Falls back to common pattern if label is missing
      kustomization:
        sh: |
          kustomization=$(kubectl -n {{.namespace}} get replicationsource {{.rsrc}} \
            -o jsonpath="{.metadata.labels.kustomize\.toolkit\.fluxcd\.io/name}" 2>/dev/null)
          if [ -z "$kustomization" ]; then
            # Try common naming pattern as fallback
            kustomization="cluster-apps-{{.rsrc}}"
            echo "Warning: Using fallback kustomization name: $kustomization" >&2
          fi
          echo "$kustomization"
      # 2) Query to find the Claim associated with the ReplicationSource (rsrc)
      claim:
        sh: |
          claim=$(kubectl -n {{.namespace}} get replicationsource {{.rsrc}} \
            -o jsonpath="{.spec.sourcePVC}" 2>/dev/null)
          if [ -z "$claim" ]; then
            echo "Error: Could not find PVC for ReplicationSource {{.rsrc}}" >&2
            exit 1
          fi
          echo "$claim"
      # 3) Query to find the controller associated with the PersistentVolumeClaim (claim)
      app:
        sh: |
          claim=$(kubectl -n {{.namespace}} get replicationsource {{.rsrc}} \
            -o jsonpath="{.spec.sourcePVC}" 2>/dev/null)
          if [ -z "$claim" ]; then
            echo "Error: Could not find PVC for ReplicationSource {{.rsrc}}" >&2
            exit 1
          fi
          app=$(kubectl -n {{.namespace}} get persistentvolumeclaim "$claim" \
            -o jsonpath="{.metadata.labels.app\.kubernetes\.io/name}" 2>/dev/null)
          if [ -z "$app" ]; then
            app="$claim"
            echo "Warning: Using PVC name as app name: $app" >&2
          fi
          echo "$app"
      controller:
        sh: |
          if kubectl -n {{.namespace}} get deployment.apps/{{.app}} >/dev/null 2>&1; then
            echo "deployment.apps/{{.app}}"
          elif kubectl -n {{.namespace}} get statefulset.apps/{{.app}} >/dev/null 2>&1; then
            echo "statefulset.apps/{{.app}}"
          elif kubectl -n {{.namespace}} get daemonset.apps/{{.app}} >/dev/null 2>&1; then
            echo "daemonset.apps/{{.app}}"
          else
            echo "Error: Could not find controller for app: {{.app}}" >&2
            exit 1
          fi
      replicas:
        sh: |
          replicas=$(kubectl -n {{.namespace}} get {{.controller}} -o jsonpath="{.spec.replicas}" 2>/dev/null)
          if [ -z "$replicas" ] || [ "$replicas" = "null" ]; then
            echo "1"
          else
            echo "$replicas"
          fi
      previous:
        sh: |
          if [ -n "{{.id}}" ]; then
            previous=$(kubectl -n {{.kopiaNamespace}} exec deploy/kopia -- \
              kopia snapshot list "{{.rsrc}}@{{.namespace}}:{{.sourcePath}}" --all --json \
              | jq -r --arg id "{{.id}}" 'sort_by(.startTime) | reverse | map(.id) | index($id)')
            if [ "$previous" = "null" ] || [ -z "$previous" ]; then
              echo "Error: Snapshot ID '{{.id}}' not found for {{.rsrc}}@{{.namespace}}:{{.sourcePath}}" >&2
              exit 1
            fi
            echo "$previous"
          elif [ -n "{{.previous}}" ]; then
            echo "{{.previous}}"
          else
            echo "0"
          fi
    preconditions:
      - sh: test -f {{.wipeJobTemplate}}
        msg: "Wipe job template not found"
      - sh: test -f {{.destinationTemplate}}
        msg: "Destination template not found"
      - sh: test -f {{.waitForJobScript}}
        msg: "Wait for job script not found"
      - sh: command -v jq >/dev/null 2>&1
        msg: jq is required for snapshot-id based restore selection
      - sh: kubectl -n {{.namespace}} get replicationsource {{.rsrc}} >/dev/null 2>&1
        msg: "ReplicationSource '{{.rsrc}}' not found in namespace '{{.namespace}}'"
      - sh: |
          claim=$(kubectl -n {{.namespace}} get replicationsource {{.rsrc}} -o jsonpath="{.spec.sourcePVC}" 2>/dev/null)
          kubectl -n {{.namespace}} get pvc "$claim" >/dev/null 2>&1
        msg: "PVC for ReplicationSource '{{.rsrc}}' not found"

  maintenance:
    desc: Trigger a manual KopiaMaintenance run (ex. task vs:maintenance [name=kopia-daily-maintenance] [namespace=system])
    cmds:
      - |
        kubectl -n {{.namespace}} patch kopiamaintenances {{.name}} --type merge \
          -p '{"spec":{"trigger":{"manual":"{{.ts}}"}}}'
      - |
        while true; do
          last_manual_sync="$(kubectl -n {{.namespace}} get kopiamaintenances {{.name}} -o jsonpath='{.status.lastManualSync}' 2>/dev/null)"
          if [ "${last_manual_sync}" = "{{.ts}}" ]; then
            break
          fi
          sleep 2
        done
      - kubectl -n {{.namespace}} get kopiamaintenances {{.name}} -o yaml
    vars:
      name: '{{.name | default "kopia-daily-maintenance"}}'
      namespace: '{{.namespace | default "system"}}'
    preconditions:
      - sh: kubectl -n {{.namespace}} get kopiamaintenances {{.name}} >/dev/null 2>&1
        msg: "KopiaMaintenance '{{.name}}' not found in namespace '{{.namespace}}'"

  status:
    desc: Show VolSync/Kopia status for a given ReplicationSource (ex. task vs:status rsrc=actual [namespace=default])
    silent: true
    cmds:
      - |
        kubectl -n {{.namespace}} get replicationsource {{.rsrc}} -o json \
          | jq -r '
            [
              ["Field", "Value"],
              ["Namespace", (.metadata.namespace // "-")],
              ["ReplicationSource", (.metadata.name // "-")],
              ["Source PVC", (.spec.sourcePVC // "-")],
              ["Repository Secret", (.spec.kopia.repository // .spec.restic.repository // "-")],
              ["Schedule", (.spec.trigger.schedule // "-")],
              ["Last Sync Time", (.status.lastSyncTime // "-")],
              ["Last Manual Sync", (.status.lastManualSync // "-")],
              ["Last Sync Duration", (.status.lastSyncDuration // "-")],
              ["Last Result", (.status.latestMoverStatus.result // "-")],
              ["Synchronizing", (((.status.conditions // []) | map(select(.type == "Synchronizing") | "\(.status) (\(.reason // "-"))") | first) // "-")],
              ["Compression", (.spec.kopia.compression // "-")],
              ["Retention", ("hourly=\(.spec.kopia.retain.hourly // "-") daily=\(.spec.kopia.retain.daily // "-") weekly=\(.spec.kopia.retain.weekly // "-") monthly=\(.spec.kopia.retain.monthly // "-")")]
            ]
            | .[]
            | @tsv' \
          | column -t -s $'\t'
      - |
        log_tail="$(kubectl -n {{.namespace}} get replicationsource {{.rsrc}} -o json \
          | jq -r '
              (.status.latestMoverStatus.logs // "")
              | split("\n")
              | map(select(length > 0))
              | .[-6:]
              | .[]')"
        if [ -n "$log_tail" ]; then
          printf "\nRecent Mover Log\n"
          printf "%s\n" "$log_tail"
        fi
    vars:
      rsrc: '{{ or .rsrc (fail "ReplicationSource `rsrc` is required") }}'
      namespace: '{{.namespace | default "default"}}'
    preconditions:
      - sh: command -v jq >/dev/null 2>&1
        msg: jq is required for summarizing ReplicationSource status
      - sh: command -v column >/dev/null 2>&1
        msg: column is required for tabular status output
      - sh: kubectl -n {{.namespace}} get replicationsources {{.rsrc}} >/dev/null 2>&1
        msg: "ReplicationSource '{{.rsrc}}' not found in namespace '{{.namespace}}'"

  # Suspend the Flux ks and hr
  restore-suspend-app:
    internal: true
    vars:
      rsrc: '{{.rsrc}}'
      app: '{{.app}}'
      namespace: '{{.namespace}}'
      kustomization: '{{.kustomization}}'
      controller: '{{.controller}}'
      replicas: '{{.replicas}}'
    cmds:
      - flux -n flux-system suspend kustomization {{.kustomization}}
      - flux -n {{.namespace}} suspend helmrelease {{.rsrc}}
      - kubectl -n {{.namespace}} scale {{.controller}} --replicas 0
      - |
        if kubectl -n {{.namespace}} get pods -l "app.kubernetes.io/name={{.app}}" --no-headers 2>/dev/null | grep -q .; then
          kubectl -n {{.namespace}} wait pod --for delete --selector="app.kubernetes.io/name={{.app}}" --timeout=2m
        else
          echo "No pods found for app.kubernetes.io/name={{.app}}, skipping delete wait"
        fi
      # Double-check that pods are really gone
      - sleep 5
      - |
        pod_count=$(kubectl -n {{.namespace}} get pods -l "app.kubernetes.io/name={{.app}}" --no-headers | wc -l)
        if [ "$pod_count" -gt 0 ]; then
          echo "Warning: Still found $pod_count pod(s) after scale down" >&2
          kubectl -n {{.namespace}} delete pods -l "app.kubernetes.io/name={{.app}}" --force --grace-period=0
          sleep 10
        fi

  # Wipe the PVC of all data
  restore-wipe-job:
    internal: true
    vars:
      rsrc: '{{.rsrc}}'
      namespace: '{{.namespace}}'
      claim: '{{.claim}}'
      ts: '{{.ts}}'
    env:
      rsrc: '{{.rsrc}}'
      namespace: '{{.namespace}}'
      claim: '{{.claim}}'
      ts: '{{.ts}}'
    cmds:
      - envsubst < <(cat {{.wipeJobTemplate}}) | kubectl apply -f -
      - bash {{.waitForJobScript}} wipe-{{.rsrc}}-{{.claim}}-{{.ts}} {{.namespace}}
      - kubectl -n {{.namespace}} wait job/wipe-{{.rsrc}}-{{.claim}}-{{.ts}} --for condition=complete --timeout=120m
      - kubectl -n {{.namespace}} logs job/wipe-{{.rsrc}}-{{.claim}}-{{.ts}} --container wipe
      - kubectl -n {{.namespace}} delete job wipe-{{.rsrc}}-{{.claim}}-{{.ts}}

  # Create VolSync replicationdestination CR to restore data
  restore-volsync-job:
    internal: true
    vars:
      rsrc: '{{.rsrc}}'
      namespace: '{{.namespace}}'
      claim: '{{.claim}}'
      ts: '{{.ts}}'
      previous: '{{.previous}}'
    env:
      rsrc: '{{.rsrc}}'
      namespace: '{{.namespace}}'
      claim: '{{.claim}}'
      ts: '{{.ts}}'
      previous: '{{.previous}}'
    cmds:
      - envsubst < <(cat {{.destinationTemplate}}) | kubectl apply -f -
      - bash {{.waitForJobScript}} volsync-dst-{{.rsrc}}-{{.claim}}-{{.ts}} {{.namespace}}
      - kubectl -n {{.namespace}} wait job/volsync-dst-{{.rsrc}}-{{.claim}}-{{.ts}} --for condition=complete --timeout=120m
      - kubectl -n {{.namespace}} delete replicationdestination {{.rsrc}}-{{.claim}}-{{.ts}}

  # Resume Flux ks and hr
  restore-resume-app:
    internal: true
    vars:
      rsrc: '{{.rsrc}}'
      app: '{{.app}}'
      namespace: '{{.namespace}}'
      kustomization: '{{.kustomization}}'
      controller: '{{.controller}}'
      replicas: '{{.replicas}}'
    cmds:
      - flux -n {{.namespace}} resume helmrelease {{.rsrc}}
      - flux -n flux-system resume kustomization {{.kustomization}}
      - kubectl -n {{.namespace}} scale {{.controller}} --replicas {{.replicas}}
      - |
        echo "Waiting for {{.controller}} to be scaled back to {{.replicas}} replica(s)..."
        kubectl -n {{.namespace}} wait --for=jsonpath='{.spec.replicas}'={{.replicas}} {{.controller}} --timeout=2m || true
      - |
        if [ "{{.replicas}}" = "0" ]; then
          echo "Original replica count was 0, skipping readiness wait"
        else
          kubectl -n {{.namespace}} wait pod --for=condition=ready --selector="app.kubernetes.io/name={{.app}}" --timeout=5m
        fi
