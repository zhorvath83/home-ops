---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  init:cloudflare:
    desc: Initialize terraform
    dir: provision/cloudflare
    cmds:
      - "terraform init"

  plan:cloudflare:
    desc: Prepare Cloudflare settings
    dir: provision/cloudflare
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform plan"

  apply:cloudflare:
    desc: Apply Cloudflare settings
    dir: provision/cloudflare
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform apply"

  unlock:cloudflare:
    desc: Force unlock Terraform state lock
    dir: provision/cloudflare
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform force-unlock -force zhorvath83/cloudflare"

  init:ovh:
    desc: Initialize OVH terraform
    dir: provision/ovh
    cmds:
      - "terraform init"

  plan:ovh:
    desc: Preview OVH changes
    dir: provision/ovh
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform plan"

  apply:ovh:
    desc: Apply OVH settings and sync S3 credentials to 1Password
    dir: provision/ovh
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform apply"
      - |
        op item edit ovh --vault HomeOps \
          "s3_user_id[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_user_id)" \
          "s3_username[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_username)" \
          "s3_user_description[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_user_description)" \
          "s3_access_key[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_access_key)" \
          "s3_secret_key[password]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_secret_key)"
      - |
        export AWS_ACCESS_KEY_ID=$(op read "op://HomeOps/ovh/s3_access_key")
        export AWS_SECRET_ACCESS_KEY=$(op read "op://HomeOps/ovh/s3_secret_key")
        IFS=', ' read -ra BUCKETS <<< "$(op read 'op://Private/OVHcloud/list_of_s3_buckets')"
        for bucket in "${BUCKETS[@]}"; do
          aws s3api put-bucket-lifecycle-configuration \
            --bucket "$bucket" \
            --endpoint-url https://s3.eu-west-par.io.cloud.ovh.net \
            --lifecycle-configuration '{"Rules":[{"ID":"to-active-archive","Status":"Enabled","Filter":{},"Transitions":[{"Days":1,"StorageClass":"GLACIER_IR"}]}]}'
        done

  unlock:ovh:
    desc: Force unlock OVH Terraform state
    dir: provision/ovh
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform force-unlock -force zhorvath83/ovh"
