---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  init:cloudflare:
    desc: Initialize terraform
    dir: provision/cloudflare
    cmds:
      - "terraform init"

  plan:cloudflare:
    desc: Prepare Cloudflare settings
    dir: provision/cloudflare
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform plan"

  apply:cloudflare:
    desc: Apply Cloudflare settings
    dir: provision/cloudflare
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform apply"

  unlock:cloudflare:
    desc: Force unlock Terraform state lock
    dir: provision/cloudflare
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform force-unlock -force zhorvath83/cloudflare"

  init:ovh:
    desc: Initialize OVH terraform
    dir: provision/ovh
    cmds:
      - "terraform init"

  plan:ovh:
    desc: Preview OVH changes
    dir: provision/ovh
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform plan"

  apply:ovh:
    desc: Apply OVH settings and sync S3 credentials to 1Password
    dir: provision/ovh
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform apply"
      - |
        op item edit ovh --vault HomeOps \
          "ovh_s3_user_id[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_user_id)" \
          "ovh_s3_username[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_username)" \
          "ovh_s3_user_description[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_user_description)" \
          "ovh_s3_access_key[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_access_key)" \
          "ovh_s3_secret_key[password]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_secret_key)" \
          "ovh_s3_endpoint[text]=$(op run --no-masking --env-file=./.env -- terraform output -raw s3_endpoint)"

  unlock:ovh:
    desc: Force unlock OVH Terraform state
    dir: provision/ovh
    cmds:
      - "op run --no-masking --env-file=./.env -- terraform force-unlock -force zhorvath83/ovh"
