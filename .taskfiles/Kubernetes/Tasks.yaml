---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:

  kubeconfig:
    desc: Download kubeconfig from a remote k3s control plane node
    vars:
      OPERATIONS_USERNAME: '{{.OPERATIONS_USERNAME | default "root"}}'
      K8S_PRIMARY_CONTROL_PLANE_HOST: '{{.K8S_PRIMARY_CONTROL_PLANE_HOST | default "192.168.1.6"}}'
      K8S_API_SERVER_HOST: '{{.K8S_API_SERVER_HOST | default "192.168.1.6"}}'
    cmds:
      - mkdir -p ~/.kube
      - rsync --verbose --progress --partial --rsync-path="sudo rsync" {{.OPERATIONS_USERNAME}}@{{.K8S_PRIMARY_CONTROL_PLANE_HOST}}:/etc/rancher/k3s/k3s.yaml "${KUBECONFIG}"
      - sed -i '' 's/127.0.0.1/'"{{.K8S_API_SERVER_HOST}}"'/g' "${KUBECONFIG}"
      - chmod go-r "${KUBECONFIG}"

  mount:
    desc: Mount a PersistentVolumeClaim to a pod temporarily
    interactive: true
    vars:
      claim: '{{ or .claim (fail "PersistentVolumeClaim `claim` is required") }}'
      namespace: '{{.namespace | default "default"}}'
    cmd: |
      kubectl run -n {{.namespace}} debug-{{.claim}} -i --tty --rm --image=null --privileged --overrides='
        {
          "apiVersion": "v1",
          "spec": {
            "containers": [
              {
                "name": "debug",
                "image": "docker.io/library/alpine:latest",
                "command": [
                  "/bin/bash"
                ],
                "stdin": true,
                "stdinOnce": true,
                "tty": true,
                "volumeMounts": [
                  {
                    "name": "config",
                    "mountPath": "/data/config"
                  }
                ]
              }
            ],
            "volumes": [
              {
                "name": "config",
                "persistentVolumeClaim": {
                  "claimName": "{{.claim}}"
                }
              }
            ],
            "restartPolicy": "Never"
          }
        }'
    preconditions:
      - kubectl -n {{.namespace}} get pvc {{.claim}}
