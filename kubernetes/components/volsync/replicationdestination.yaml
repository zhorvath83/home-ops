---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/volsync.backube/replicationdestination_v1alpha1.json
# Bootstrap-only restore manifest. Permanently rendered, but inert by default:
# - `kustomize.toolkit.fluxcd.io/ssa: IfNotPresent` makes Flux apply it ONCE per cluster
#   (subsequent reconciles will NOT overwrite manual edits made by `just volsync restore`).
# - `spec.trigger.manual: restore-once` means VolSync only acts when the trigger value
#   is updated, so the RD is created Idle and waits for a manual cutover trigger.
# Matching `dataSourceRef` lives in pvc.yaml.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}-bootstrap"
  labels:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  trigger:
    manual: restore-once
  kopia:
    accessModes:
      - "${VOLSYNC_ACCESSMODES:=ReadWriteOnce}"
    capacity: "${VOLSYNC_CAPACITY:=1Gi}"
    cleanupCachePVC: true
    cleanupTempPVC: true
    copyMethod: Snapshot
    enableFileDeletion: true
    repository: "${APP}-volsync-secret"
    sourceIdentity:
      sourceName: "${APP}"
    storageClassName: "${VOLSYNC_STORAGECLASS:=democratic-csi-local-hostpath}"
    volumeSnapshotClassName: "${VOLSYNC_SNAPSHOTCLASS:=democratic-csi-local-hostpath}"
    moverSecurityContext:
      runAsUser: ${APP_UID:=10001}
      runAsGroup: ${APP_GID:=10001}
      fsGroup: ${APP_GID:=10001}
