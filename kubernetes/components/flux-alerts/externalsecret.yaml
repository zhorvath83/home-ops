---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-pushover
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: flux-pushover-secret
    creationPolicy: Owner
    template:
      data:
        # Address for the in-cluster flux-provider-pushover relay (forwards generic webhook → Pushover API)
        address: http://flux-provider-pushover.flux-system.svc.cluster.local:8080/webhook
        # Authorization header validates the request to the relay
        headers: 'Authorization: Bearer {{ .PUSHOVER_FLUXCD_API_KEY }}'
  dataFrom:
    - extract:
        key: pushover
