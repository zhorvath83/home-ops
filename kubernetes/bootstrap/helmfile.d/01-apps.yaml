---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
#
# Bootstraps the minimal application stack the cluster needs before Flux can
# take over reconciliation. Each release reads its Helm values directly from
# the matching kubernetes/apps/<namespace>/<name>/app/helmrelease.yaml via the
# values.yaml.gotmpl template — there is no value duplication between bootstrap
# and runtime.

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  # 1. Cilium CNI — installed first; the node is NotReady until the CNI is up.
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.4
    values:
      - ./templates/values.yaml.gotmpl
    hooks:
      - # Wait for Cilium CRDs to become available
        command: bash
        args:
          - -c
          - until kubectl get crd ciliumloadbalancerippools.cilium.io ciliuml2announcementpolicies.cilium.io &>/dev/null; do sleep 5; done
        events:
          - postsync
        showlogs: true
      - # Apply LoadBalancer IP pool + L2 announcement policy
        command: kubectl
        args:
          - apply
          - --namespace=kube-system
          - --server-side
          - --field-manager=kustomize-controller
          - --kustomize
          - ../../apps/kube-system/cilium/config/
        events:
          - postsync
        showlogs: true

  # 2. CoreDNS — Talos' built-in CoreDNS is disabled, this replaces it.
  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.45.2
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - kube-system/cilium

  # 3. cert-manager — Cloudflare DNS-01 solver is built-in, no webhook needed.
  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.2
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - kube-system/coredns

  # 4. External Secrets Operator
  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.4.1
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - cert-manager/cert-manager

  # 5. 1Password Connect server + ClusterSecretStore
  - name: onepassword-connect
    namespace: external-secrets
    chart: oci://ghcr.io/1password/connect
    version: 2.4.1
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - external-secrets/external-secrets
    hooks:
      - # Apply ClusterSecretStore once the Connect deployment is up
        command: kubectl
        args:
          - apply
          - --server-side
          - --field-manager=kustomize-controller
          - --filename
          - ../../apps/external-secrets/onepassword-connect/app/clustersecretstore.yaml
        events:
          - postsync
        showlogs: true

  # 6. Flux Operator — installs the Flux controllers declaratively.
  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.49.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - external-secrets/onepassword-connect

  # 7. Flux Instance — FluxInstance CR drives the controller deployment and
  #    creates the GitRepository + bootstrap Kustomization that reads
  #    kubernetes/flux/cluster/.
  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.49.0
    wait: false
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - flux-system/flux-operator
