---
# Talos factory.talos.dev schematic.
# POST this file to https://factory.talos.dev/schematics to obtain a schematic ID.
# That ID becomes part of the installer image URL:
#   factory.talos.dev/metal-installer/<schematic-id>:<TALOS_VERSION>
#
# Regenerate the ID via: `just talos gen-schematic-id`
customization:
  extraKernelArgs:
    # bjw-s pattern — works around a slow boot path on some Intel platforms.
    - initcall_blacklist=algif_aead_init
    # Intel iGPU GuC (Graphics microcontroller) firmware load — required for
    # hardware video decode/encode (Plex HW transcode, Phase 2 enablement).
    # Value 3 = enable GuC submission + HuC firmware authentication.
    - i915.enable_guc=3
    # Hardens against kexec-based attacks on the kernel image. Recommended
    # alongside i915.enable_guc per onedr0p / Talos community guidance.
    - sysctl.kernel.kexec_load_disabled=1
  systemExtensions:
    officialExtensions:
      # Intel iGPU driver. Together with the i915.enable_guc=3 kernel arg
      # above, prepares the node for a future Plex hardware transcode setup.
      # The device mount into the Plex pod is NOT enabled today (see
      # docs/migration/14-post-cutover.md, Phase 2).
      - siderolabs/i915
      # Intel CPU microcode — security and stability updates.
      - siderolabs/intel-ucode
      # Intel Management Engine Interface — exposes hardware sensors and
      # management bus to userspace (companion to i915 on Intel platforms).
      - siderolabs/mei
