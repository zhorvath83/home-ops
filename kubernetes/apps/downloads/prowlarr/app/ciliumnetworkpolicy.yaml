---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# prowlarr (AD-023): envoy-internal ingress via the ingress-from-gateway-internal CCNP; this CNP admits radarr/sonarr pulling indexer details from prowlarr on the API port (reverse direction of the app-UI "prowlarr → radarr/sonarr" sync config).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prowlarr
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prowlarr
      app.kubernetes.io/instance: prowlarr
      app.kubernetes.io/controller: prowlarr
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: downloads
            app.kubernetes.io/name: radarr
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: downloads
            app.kubernetes.io/name: sonarr
      toPorts:
        - ports:
            - port: "9696"
              protocol: TCP
