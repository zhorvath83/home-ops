---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: maintainerr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed (gateways CCNP) + internet egress (TMDB metadata + movie APIs) via the allow-world-egress CCNP
      labels:
        ingress.home.arpa/gateways: "true"
        egress.home.arpa/allow-world: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      maintainerr:
        containers:
          app:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.17.1@sha256:2f34f6a91f3c20cd12af790ed1ef4c98e06ca4f1bb69be338e9d89d9907f628b
            env:
              TZ: "${TIMEZONE}"
              UI_PORT: &port 6246
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 1m
                memory: 160Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: maintainerr
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: maintainerr
          gethomepage.dev/group: Arr Stack
          gethomepage.dev/icon: maintainerr.png
        hostnames:
          - "{{ .Release.Name }}.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      tmpfs:
        type: emptyDir
        advancedMounts:
          maintainerr:
            app:
              - path: /opt/data/logs
                subPath: logs
              - path: /tmp
                subPath: tmp
