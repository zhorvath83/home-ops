---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      hostname: qbittorrent
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: internet egress (BitTorrent peers + trackers) via the allow-world-egress CCNP
      labels:
        egress.home.arpa/allow-world: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-init:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.2@sha256:24f2d793cb7f7a93e755e5d22e533be818e62eadc864f4a82315b901b6ffe807
            command:
              - "/bin/bash"
              - "/scripts/qbt-init.sh"
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              limits:
                memory: 128Mi
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.2@sha256:24f2d793cb7f7a93e755e5d22e533be818e62eadc864f4a82315b901b6ffe807
            env:
              TZ: "${TIMEZONE}"
              QBT_WEBUI_PORT: &port 8080
              QBT_TORRENTING_PORT: &torrentPort 62418
              QBT_WEBUI_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-secret
                    key: webui-username
              QBT_WEBUI_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-secret
                    key: webui-password
            nameOverride: qbittorrent
            lifecycle:
              postStart:
                exec:
                  command:
                    - "/bin/bash"
                    - "-c"
                    - "exec /bin/bash /scripts/qbt-poststart.sh > /proc/1/fd/1 2>/proc/1/fd/2"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 300Mi
              limits:
                memory: 3000Mi
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: *port
          bittorrent-tcp:
            port: *torrentPort
            protocol: TCP
          bittorrent-udp:
            port: *torrentPort
            protocol: UDP
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: qBt
          gethomepage.dev/group: Downloading
          gethomepage.dev/icon: qbittorrent.svg
        hostnames:
          - "bt.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: qbittorrent
        globalMounts:
          - path: /config
      scripts:
        type: configMap
        name: qbittorrent-scripts
        globalMounts:
          - path: /scripts
            readOnly: true
      nfs-nas-media:
        type: nfs
        server: ${NAS_IP}
        path: /media
        globalMounts:
          - path: /media
      ipfilter:
        type: emptyDir
        globalMounts:
          - path: /ipfilter
