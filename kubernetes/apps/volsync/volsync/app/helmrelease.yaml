---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: volsync

  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Chart defaults: container=drop ALL+readOnlyRootFS+noPrivEsc, but NO seccompProfile.
    # Image runs as root (no USER in Dockerfile) — do NOT set runAsNonRoot.
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    manageCRDs: true
    metrics:
      disableAuth: true
    resources:
      requests:
        cpu: 10m
        memory: 140Mi
      limits:
        memory: 512Mi
