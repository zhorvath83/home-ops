---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# grafana (AD-023): envoy + prometheus ingress via the matching CCNPs; custom-egress opt-out, so this CNP is the
# sole egress source — narrow-world plugin/dashboard CDNs + the in-cluster datasources (Prometheus/VictoriaLogs/Alertmanager).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: grafana
  egress:
    # grafana.com — plugin marketplace API + gnetId dashboard downloads.
    # storage.googleapis.com — plugin archive CDN (grafana-plugins-catalog bucket; plugin .zip fetch).
    # raw.githubusercontent.com — URL-style dashboards (flux/envoy).
    # DNS via the cluster-wide allow-dns-egress CCNP.
    - toFQDNs:
        - matchName: "grafana.com"
        - matchPattern: "*.grafana.com"
        - matchName: "storage.googleapis.com"
        - matchPattern: "*.storage.googleapis.com"
        - matchName: "raw.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # In-cluster datasources (observability).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
            app.kubernetes.io/instance: kube-prometheus-stack
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: alertmanager
            app.kubernetes.io/instance: kube-prometheus-stack
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: victoria-logs-single
            app.kubernetes.io/instance: victoria-logs
      toPorts:
        - ports:
            - port: "9428"
              protocol: TCP
