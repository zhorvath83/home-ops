---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# grafana instance (AD-023): envoy + prometheus ingress via CCNPs; custom-egress → egress comes from
# this CNP (gravatar avatars, in-cluster Prometheus/Alertmanager datasources) plus the allow-gateways
# label (public-issuer OIDC hairpin via the allow-gateways-egress CCNP).
# Operator model: no sidecars (kube-apiserver gone), dashboards fetched by the operator (grafana.com/
# raw.githubusercontent.com gone), no plugins per D13 (plugin CDN + victoria-logs egress gone).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  ingress:
    # operator provisioning API calls (datasources/dashboards/folders CRUD).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: grafana-operator
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
  egress:
    - toFQDNs:
        - matchName: "gravatar.com"
        - matchPattern: "*.gravatar.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
            app.kubernetes.io/instance: kube-prometheus-stack
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: alertmanager
            app.kubernetes.io/instance: kube-prometheus-stack
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
