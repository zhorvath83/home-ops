---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
      feedback_links_enabled: "false"
    auth:
      # OIDC-only for humans: hide the local login form. The admin credential stays as the
      # grafana-operator provisioning credential (in-cluster API), not a human login path.
      disable_login_form: "true"
    # grafana.ini [auth.generic_oauth] is a dotted section name → first-level key under config.
    auth.generic_oauth:
      # Uniform public-issuer convention (AD-023): every OIDC endpoint uses the public hostname.
      enabled: "true"
      # client_id is public (shown in Kanidm discovery) — hardcoded, not secret-backed.
      client_id: "grafana"
      scopes: openid email profile groups
      auth_url: "https://idm.${PUBLIC_DOMAIN}/ui/oauth2"
      token_url: "https://idm.${PUBLIC_DOMAIN}/oauth2/token"
      # userinfo endpoint — Kanidm serves it per-client at /oauth2/openid/<client_id>/userinfo.
      api_url: "https://idm.${PUBLIC_DOMAIN}/oauth2/openid/grafana/userinfo"
      use_pkce: "true"
      use_refresh_token: "true"
      login_attribute_path: "preferred_username"
      email_attribute_name: "email"
      allow_sign_up: "true"
      # grafana_admins → Admin; no grafana_users group yet, so everyone else → None (no access).
      role_attribute_path: "contains(groups[*], 'grafana_admins@idm.${PUBLIC_DOMAIN}') && 'Admin' || 'None'"
      role_attribute_strict: "true"
      skip_org_role_sync: "false"
    date_formats:
      use_browser_locale: "true"
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
      # D13: no plugins — don't fetch the default preinstall apps from grafana.com at startup.
      preinstall_disabled: "true"
    security:
      allow_embedding: "true"
      # Non-human admin login for the grafana-operator provisioning API. Must NOT collide with
      # any OIDC preferred_username (human logins come from Kanidm). See AD-023 / IAM area.
      admin_user: "provisioning"
    server:
      root_url: "https://grafana.${PUBLIC_DOMAIN}"
      enable_gzip: "true"
  disableDefaultAdminSecret: true
  disableDefaultSecurityContext: All
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        metadata:
          labels:
            app.kubernetes.io/name: grafana
            ingress.home.arpa/allow-gateway-internal: "true"
            ingress.home.arpa/allow-prometheus: "true"
            egress.home.arpa/custom-egress: "true"
            egress.home.arpa/allow-gateways: "true"
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: PROVISIONING_PASSWORD
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: OIDC_CLIENT_SECRET
              resources:
                requests:
                  cpu: 10m
                  memory: 180Mi
                limits:
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - "ALL"
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
          volumes:
            - name: tmp
              emptyDir: {}
