---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
      feedback_links_enabled: "false"
    auth:
      # OIDC-only: password webform disabled. Recovery = flip here, Flux redeploys, form returns.
      disable_login: "true"
    # grafana.ini [auth.generic_oauth] is a dotted section name → first-level key under config.
    auth.generic_oauth:
      # Uniform public-issuer convention (AD-023): every OIDC endpoint uses the public hostname.
      enabled: "true"
      name: Pocket ID
      scopes: openid email profile groups
      auth_url: "https://id.${PUBLIC_DOMAIN}/authorize"
      token_url: "https://id.${PUBLIC_DOMAIN}/api/oidc/token"
      api_url: "https://id.${PUBLIC_DOMAIN}/api/oidc/userinfo"
      email_attribute_name: "email:primary"
      allow_sign_up: "true"
      # grafana_admins → Admin; no grafana_users group yet, so everyone else → None (no access).
      role_attribute_path: "contains(groups[*], 'grafana_admins') && 'Admin' || 'None'"
      role_attribute_strict: "true"
      skip_org_role_sync: "false"
    date_formats:
      use_browser_locale: "true"
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
    security:
      allow_embedding: "true"
    server:
      root_url: "https://grafana.${PUBLIC_DOMAIN}"
      enable_gzip: "true"
  disableDefaultAdminSecret: true
  disableDefaultSecurityContext: All
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        metadata:
          labels:
            app.kubernetes.io/name: grafana
            ingress.home.arpa/gateways: "true"
            ingress.home.arpa/prometheus: "true"
            egress.home.arpa/custom-egress: "true"
            egress.home.arpa/allow-gateways: "true"
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: admin-user
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: admin-password
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: OIDC_CLIENT_ID
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: OIDC_CLIENT_SECRET
              resources:
                requests:
                  cpu: 10m
                  memory: 180Mi
                limits:
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - "ALL"
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
          volumes:
            - name: tmp
              emptyDir: {}
