---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
# LAN-only permanently (decision D6 override): envoy-internal only, never envoy-external.
# Safer — no internet-exposed Grafana window before Pocket-ID SSO lands in P5.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Grafana
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: grafana.svg
spec:
  hostnames:
    - "grafana.${PUBLIC_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - name: grafana-service
          port: 3000
