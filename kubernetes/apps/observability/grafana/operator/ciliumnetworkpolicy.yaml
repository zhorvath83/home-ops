---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# grafana-operator (AD-023): custom-egress opt-out, so this CNP is the sole egress source —
# kube-apiserver (watch/reconcile CRs), the Grafana instance provisioning API (:3000), and
# url-sourced dashboard downloads (grafana.com + raw.githubusercontent.com). DNS via the cluster-wide
# allow-dns-egress CCNP. Prometheus scrape ingress is handled by the cluster CCNP, not here.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana-operator
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-operator
  egress:
    # kube-apiserver — the operator watches/provisions grafana-operator CRs via the K8s API.
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # Grafana instance — the operator provisions datasources/dashboards/folders via the Grafana HTTP API.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: grafana
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # url-sourced dashboard JSON downloads (grafana.com gnetId API + raw.githubusercontent.com).
    - toFQDNs:
        - matchName: "grafana.com"
        - matchPattern: "*.grafana.com"
        - matchName: "raw.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
