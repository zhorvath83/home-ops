---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  values:
    fullnameOverride: victoria-logs-collector
    # AD-023 V5e: close ingress (default-deny) except the Prometheus scrape via the CCNP; the collector has no probes and no other ingress.
    podLabels:
      ingress.home.arpa/allow-prometheus: "true"
    global:
      image:
        registry: quay.io
    podMonitor:
      enabled: true
    remoteWrite:
      - url: http://victoria-logs-server.observability.svc.cluster.local:9428
