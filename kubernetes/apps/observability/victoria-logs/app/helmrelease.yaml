---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  values:
    global:
      image:
        registry: quay.io
    fullnameOverride: victoria-logs
    server:
      # AD-023 V5e: custom-egress sink (DNS-only; egress locked by ciliumnetworkpolicy.yaml) + envoy-internal route & prometheus scrape ingress via CCNPs.
      podLabels:
        egress.home.arpa/custom-egress: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
        ingress.home.arpa/allow-prometheus: "true"
      persistentVolume:
        enabled: true
        size: 10Gi
      retentionPeriod: 14d
      route:
        enabled: true
        extraRules:
          - matches:
              - path:
                  type: Exact
                  value: /
            filters:
              - type: RequestRedirect
                requestRedirect:
                  scheme: https
                  statusCode: 302
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /select/vmui/
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Victoria Logs
          gethomepage.dev/group: Observability
          gethomepage.dev/icon: sh-victoriametrics
          gethomepage.dev/pod-selector: app.kubernetes.io/name=victoria-logs-single
        hostnames:
          - "logs.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
      serviceMonitor:
        enabled: true
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Observability
      grafanaOperator:
        enabled: false
