---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  values:
    global:
      image:
        registry: quay.io
    fullnameOverride: victoria-logs
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
      retentionPeriod: 14d
      route:
        enabled: true
        hostnames:
          - "logs.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
      serviceMonitor:
        enabled: true
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Observability
      grafanaOperator:
        enabled: false
