---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# victoria-logs server (AD-023 V5e): custom-egress opt-out with NO egress section → the server is a pure log sink and only
# needs DNS (via the cluster-wide allow-dns-egress CCNP); it never initiates other egress. Ingress default-deny: the
# envoy-internal route + Prometheus scrape arrive via the ingress.home.arpa/{gateways,prometheus} labels + matching CCNPs
# (everything is served on :9428). The app-unique ingress below is the kubelet health probes (:9428, kube-apiserver identity
# on the single node, with a reserved:host fallback) and the collector's remoteWrite push.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: victoria-logs
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs-single
      app.kubernetes.io/instance: victoria-logs
  ingress:
    # kubelet liveness/readiness probes (:9428); node IP carries the kube-apiserver identity on the single node.
    - fromEntities:
        - kube-apiserver
        - host
      toPorts:
        - ports:
            - port: "9428"
              protocol: TCP
    # victoria-logs collector — remoteWrite log ingestion.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: victoria-logs-collector
      toPorts:
        - ports:
            - port: "9428"
              protocol: TCP
