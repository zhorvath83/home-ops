---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: silence-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: silence-operator
  values:
    # Reconciles Silence CRs into Alertmanager API silences.
    alertmanagerAddress: http://alertmanager-operated.observability.svc.cluster.local:9093
    # AD-023 Cilium model manages policy separately (see ciliumnetworkpolicy.yaml).
    # Chart ships a hardened securityContext (non-root 65534, drop ALL, read-only rootfs,
    # RuntimeDefault), explicit resources (50m/50Mi -> 50m/100Mi), and a PodMonitor.
    networkPolicy:
      enabled: false
