---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# kube-prometheus-stack prometheus (AD-023): V3 flip drops LAN from the baseline,
# so the openwrt router node-exporter scrape (additionalScrapeConfigs job 'openwrt',
# ${ROUTER_IP}:9100) needs an explicit LAN egress grant.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kube-prometheus-stack-prometheus
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/instance: kube-prometheus-stack
  egress:
    # OpenWRT router node-exporter scrape.
    - toCIDRSet:
        - cidr: 192.168.1.1/32
      toPorts:
        - ports:
            - port: "9100"
              protocol: TCP
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# alertmanager (AD-023): envoy + prometheus ingress via the matching CCNPs; this CNP adds the
# east-west rules to the Alertmanager API: flux notification-controller (reconciliation alerts,
# Phase 2) and grafana (Alertmanager datasource browse, unified_alerting UI).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: alertmanager
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flux-system
            app: notification-controller
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: grafana
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
