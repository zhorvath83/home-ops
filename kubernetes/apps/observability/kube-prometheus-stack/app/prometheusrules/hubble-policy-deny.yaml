---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hubble-policy-deny
spec:
  groups:
    - name: hubble
      rules:
        # Strip the cilium-agent scrape-target labels once; the pushover receiver
        # renders every .Labels.SortedPairs, so leaving them turns the phone
        # notification into scraper noise. Flow-relevant labels are preserved.
        # qbittorrent is intentionally outbound-only (no LB / no port-forward); the
        # unsolicited ICMP world->pod inbound is correctly default-denied and is pure
        # noise. Only ICMP is excluded — TCP/UDP ingress denies to qbittorrent still page.
        - record: hubble_policy_denied_increase5m
          expr: |
            sum without (container, endpoint, instance, job, namespace, node, pod, service) (
              increase(hubble_drop_total{reason="POLICY_DENIED"}[5m])
              unless
              increase(hubble_drop_total{reason="POLICY_DENIED", destination_namespace="downloads", destination_pod=~"qbittorrent-.*", traffic_direction="ingress", protocol=~"ICMPv[46]"}[5m])
            )
        # plex-trakt-sync egress uses Cilium toFQDNs for trakt.tv/plex.tv; the
        # first connection to a freshly-resolved IP can race the DNS-proxy cache
        # update and drop 1-2 SYNs before succeeding. Threshold only this app so
        # a transient race (~2/5m) doesn't page, while a sustained/repeated deny
        # (>5/5m — real leak or stuck retry) still does. Every other app keeps >0.
        - alert: HubblePolicyDeny
          expr: |
            hubble_policy_denied_increase5m{source_pod!~"plex-trakt-sync-.*"} > 0
            or
            hubble_policy_denied_increase5m{source_pod=~"plex-trakt-sync-.*"} > 3
          labels:
            severity: critical
          annotations:
            summary: "Cilium policy denied a packet (Hubble)"
            # destination_ip / source_ip / traffic_direction populate once the Tier 1
            # cilium labelsContext lands; before that they render empty (still valid).
            description: |-
              Policy-denied drop ({{ $labels.traffic_direction }}) {{ $labels.source_namespace }}/{{ $labels.source_pod }} [{{ $labels.source_ip }}] -> {{ $labels.destination_namespace }}/{{ $labels.destination_pod }} [{{ $labels.destination_ip }}] (proto: {{ $labels.protocol }}).
              Investigate: {{ if eq $labels.traffic_direction "egress" }}hubble observe --from-pod {{ $labels.source_namespace }}/{{ $labels.source_pod }}{{ else }}hubble observe --to-pod {{ $labels.destination_namespace }}/{{ $labels.destination_pod }}{{ end }} --verdict DROPPED --print-policy-names --last 200
