---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
# Generic Kubernetes / node / OpenWRT dashboards owned by kube-prometheus-stack
# (same namespace as the Grafana instance → no cross-namespace import).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-views-global
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folderRef: observability
  grafanaCom:
    id: 15757
    revision: 43
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
