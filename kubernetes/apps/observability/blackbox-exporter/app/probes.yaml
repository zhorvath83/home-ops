---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/probe_v1.json
# Probe CRs are scraped by the kube-prometheus-stack Prometheus once its probeSelector
# is match-all (probeSelectorNilUsesHelmValues: false).
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: devices
spec:
  jobName: devices_probe
  interval: 60s
  module: icmp
  prober:
    url: prometheus-blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - nas.lan
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: nfs
spec:
  jobName: nfs_probe
  interval: 60s
  module: tcp_connect
  prober:
    url: prometheus-blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - nas.lan:2049
