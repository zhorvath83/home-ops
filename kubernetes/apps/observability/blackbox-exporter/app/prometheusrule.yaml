---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
# Picked up by the kube-prometheus-stack Prometheus once ruleSelector is match-all
# (ruleSelectorNilUsesHelmValues: false). severity=critical routes to Pushover.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: blackbox-exporter
spec:
  groups:
    - name: blackbox-exporter
      rules:
        - alert: BlackboxProbeFailed
          expr: probe_success == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Blackbox probe failed ({{ $labels.instance }})"
            description: "Probe for {{ $labels.instance }} (job {{ $labels.job }}) has been failing for 2m."
