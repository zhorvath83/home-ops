---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: blackbox-exporter
  values:
    # Deterministic service name so the Probe CR prober URL is stable.
    fullnameOverride: prometheus-blackbox-exporter
    config:
      modules:
        http_2xx:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - "HTTP/1.1"
              - "HTTP/2.0"
            follow_redirects: true
            preferred_ip_protocol: "ip4"
        # ICMP reachability of nas.lan — needs NET_RAW (see securityContext below).
        icmp:
          prober: icmp
          timeout: 5s
          icmp:
            preferred_ip_protocol: "ip4"
        # NFS tcp/2049 reachability of nas.lan.
        tcp_connect:
          prober: tcp
          timeout: 5s
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
        # ICMP probing requires NET_RAW on top of the dropped set.
        add:
          - "NET_RAW"
    pod:
      labels:
        ingress.home.arpa/prometheus: "true"
        egress.home.arpa/custom-egress: "true"
    serviceMonitor:
      # Exporter's own /metrics (blackbox_exporter_* used by dashboard 7587).
      selfMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
