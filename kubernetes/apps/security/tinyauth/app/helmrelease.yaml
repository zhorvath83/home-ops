---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tinyauth
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      tinyauth:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/steveiliop56/tinyauth
              repository: ghcr.io/steveiliop56/tinyauth
              tag: v5.0.7
            env:
              TZ: "${TIMEZONE}"
              TINYAUTH_APPURL: "https://auth.${PUBLIC_DOMAIN}"
              TINYAUTH_SERVER_PORT: &port 3000
              TINYAUTH_SERVER_ADDRESS: 0.0.0.0
              TINYAUTH_DATABASE_DRIVER: sqlite
              TINYAUTH_DATABASE_PATH: /data/tinyauth.db
              TINYAUTH_AUTH_SECURECOOKIE: "true"
              TINYAUTH_AUTH_SESSIONEXPIRY: 86400
              TINYAUTH_LOG_LEVEL: info
              TINYAUTH_LOG_JSON: "true"
              TINYAUTH_OAUTH_AUTOREDIRECT: pocketid
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_NAME: "Pocket ID"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_SCOPES: "openid email profile groups"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_AUTHURL: "https://id.${PUBLIC_DOMAIN}/authorize"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_TOKENURL: "https://id.${PUBLIC_DOMAIN}/api/oidc/token"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_USERINFOURL: "https://id.${PUBLIC_DOMAIN}/api/oidc/userinfo"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_REDIRECTURL: "https://auth.${PUBLIC_DOMAIN}/api/oauth/callback/pocketid"
            envFrom:
              - secretRef:
                  name: tinyauth-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: tinyauth
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: tinyauth
        advancedMounts:
          tinyauth:
            app:
              - path: /data
      tmp:
        type: emptyDir
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "false"
        hostnames:
          - "auth.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
