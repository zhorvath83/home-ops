---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tinyauth
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed app, ingress from gateways (ingress-from-gateways CCNP)
      labels:
        ingress.home.arpa/gateways: "true"
        ingress.home.arpa/allow-gateway-external: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      tinyauth:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/tinyauthapp/tinyauth
              repository: ghcr.io/tinyauthapp/tinyauth
              tag: v5.0.7@sha256:0793c71c49906e079d90c7e693cded9df569217a92d717dc9b171f2116fcd1c6
            env:
              TZ: "${TIMEZONE}"
              TINYAUTH_UI_TITLE: "Authentication"
              TINYAUTH_APPURL: "https://auth.${PUBLIC_DOMAIN}"
              TINYAUTH_ANALYTICS_ENABLED: false
              TINYAUTH_SERVER_PORT: &port 3000
              TINYAUTH_SERVER_ADDRESS: 0.0.0.0
              # Pod CIDR; narrower trust handled by the tinyauth CiliumNetworkPolicy.
              TINYAUTH_AUTH_TRUSTEDPROXIES: 10.244.0.0/16
              TINYAUTH_RESOURCES_PATH: /data/resources
              TINYAUTH_DATABASE_PATH: /data/tinyauth.db
              TINYAUTH_AUTH_SECURECOOKIE: "true"
              # 8h sliding idle, 7d hard cap.
              TINYAUTH_AUTH_SESSIONEXPIRY: 28800
              TINYAUTH_AUTH_SESSIONMAXLIFETIME: 604800
              # Re-enable when upstream tinyauth ships a stable release with the
              # Auth.ACLs.Policy field AND the UserAllowedRule OAuth empty-filter
              # asymmetry is fixed (currently returns Deny, should Abstain).
              # TINYAUTH_AUTH_ACLS_POLICY: deny
              TINYAUTH_LOG_LEVEL: info
              TINYAUTH_LOG_JSON: "true"
              # Emit auth events on a dedicated stream for security forensics.
              TINYAUTH_LOG_STREAMS_AUDIT_ENABLED: "true"
              TINYAUTH_OAUTH_AUTOREDIRECT: pocketid
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_NAME: "IdP"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_SCOPES: "openid email profile groups"
              # Uniform public-issuer convention (AD-023): every OIDC endpoint uses the public hostname.
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_AUTHURL: "https://id.${PUBLIC_DOMAIN}/authorize"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_REDIRECTURL: "https://auth.${PUBLIC_DOMAIN}/api/oauth/callback/pocketid"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_TOKENURL: "https://id.${PUBLIC_DOMAIN}/api/oidc/token"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_USERINFOURL: "https://id.${PUBLIC_DOMAIN}/api/oidc/userinfo"
              # Per-app ACLs are MANDATORY on v5.0.7 — without a per-app block the
              # OAuthGroupRule returns Allow on nil ACLs and lets any authenticated
              # user through.
              TINYAUTH_APPS_bazarr_CONFIG_DOMAIN: "subs.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_bazarr_OAUTH_GROUPS: bazarr_users
              TINYAUTH_APPS_echo_CONFIG_DOMAIN: "echo.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_echo_OAUTH_GROUPS: echo_server_users
              TINYAUTH_APPS_maintainerr_CONFIG_DOMAIN: "maintainerr.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_maintainerr_OAUTH_GROUPS: maintainerr_users
              TINYAUTH_APPS_prowlarr_CONFIG_DOMAIN: "indexers.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_prowlarr_OAUTH_GROUPS: prowlarr_users
              TINYAUTH_APPS_qbittorrent_CONFIG_DOMAIN: "bt.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_qbittorrent_OAUTH_GROUPS: qbittorrent_users
              TINYAUTH_APPS_radarr_CONFIG_DOMAIN: "movies.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_radarr_OAUTH_GROUPS: radarr_users
              TINYAUTH_APPS_seerr_CONFIG_DOMAIN: "reqs.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_seerr_OAUTH_GROUPS: seerr_users
              TINYAUTH_APPS_sonarr_CONFIG_DOMAIN: "shows.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_sonarr_OAUTH_GROUPS: sonarr_users
              TINYAUTH_APPS_subsyncarr_CONFIG_DOMAIN: "subsync.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_subsyncarr_OAUTH_GROUPS: subsyncarr_users
            envFrom:
              - secretRef:
                  name: tinyauth-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: tinyauth
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: tinyauth
        advancedMounts:
          tinyauth:
            app:
              - path: /data
      tmp:
        type: emptyDir
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "false"
        hostnames:
          - "auth.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
