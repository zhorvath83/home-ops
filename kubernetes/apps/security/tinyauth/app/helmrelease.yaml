---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tinyauth
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed app, ingress via the ingress-from-gateway-external + -internal CCNPs
      labels:
        ingress.home.arpa/allow-gateway-external: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      tinyauth:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/tinyauthapp/tinyauth
              repository: ghcr.io/tinyauthapp/tinyauth
              tag: v5.1.0@sha256:b16837b6b88dcfdc43881a1efb30b913bb5a82ae6a3f85486841f817f6f6649d
            env:
              TZ: "${TIMEZONE}"
              TINYAUTH_UI_TITLE: "Authentication"
              TINYAUTH_APPURL: "https://auth.${PUBLIC_DOMAIN}"
              TINYAUTH_ANALYTICS_ENABLED: false
              TINYAUTH_SERVER_PORT: &port 3000
              TINYAUTH_SERVER_ADDRESS: 0.0.0.0
              # Pod CIDR; narrower trust handled by the tinyauth CiliumNetworkPolicy.
              TINYAUTH_AUTH_TRUSTEDPROXIES: 10.244.0.0/16
              TINYAUTH_RESOURCES_PATH: /data/resources
              TINYAUTH_DATABASE_PATH: /data/tinyauth.db
              # auto-detected with no SA token (automount disabled); env-based apps, not labels.
              TINYAUTH_LABEL_PROVIDER: "none"
              TINYAUTH_AUTH_SECURECOOKIE: "true"
              # 8h sliding idle, 7d hard cap.
              TINYAUTH_AUTH_SESSIONEXPIRY: 28800
              TINYAUTH_AUTH_SESSIONMAXLIFETIME: 604800
              # v5.1.0 deny-by-default: nil ACL / unknown host → Deny (fail-closed).
              TINYAUTH_AUTH_ACLS_POLICY: deny
              TINYAUTH_LOG_LEVEL: info
              TINYAUTH_LOG_JSON: "true"
              # Emit auth events on a dedicated stream for security forensics.
              TINYAUTH_LOG_STREAMS_AUDIT_ENABLED: "true"
              TINYAUTH_OAUTH_AUTOREDIRECT: pocketid
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_NAME: "IdP"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_SCOPES: "openid email profile groups"
              # Uniform public-issuer convention (AD-023): every OIDC endpoint uses the public hostname.
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_AUTHURL: "https://id.${PUBLIC_DOMAIN}/authorize"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_REDIRECTURL: "https://auth.${PUBLIC_DOMAIN}/api/oauth/callback/pocketid"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_TOKENURL: "https://id.${PUBLIC_DOMAIN}/api/oidc/token"
              TINYAUTH_OAUTH_PROVIDERS_POCKETID_USERINFOURL: "https://id.${PUBLIC_DOMAIN}/api/oidc/userinfo"
              # Per-app ACLs are MANDATORY (nil ACL → OAuthGroupRule Allow, any user passes).
              # v5.1.0 asymmetry: empty oauth.whitelist makes UserAllowedRule deny OAuth users
              # (ErrFilterEmpty → Deny, not Abstain), so OAUTH_WHITELIST "/.*/" passes any
              # authenticated email and defers access control to OAUTH_GROUPS.
              # Matching is by CONFIG_DOMAIN (host), not the app ID.
              TINYAUTH_APPS_bazarr_CONFIG_DOMAIN: "subs.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_bazarr_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_bazarr_OAUTH_GROUPS: bazarr_users
              TINYAUTH_APPS_echo_CONFIG_DOMAIN: "echo.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_echo_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_echo_OAUTH_GROUPS: echo_server_users
              # App ID must be a single token: paerser's env decoder turns underscores into
              # dots, so an underscored ID would not bind the ACL (nil-ACL allow-all leaks).
              TINYAUTH_APPS_hubbleui_CONFIG_DOMAIN: "hubble.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_hubbleui_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_hubbleui_OAUTH_GROUPS: hubble_users
              TINYAUTH_APPS_maintainerr_CONFIG_DOMAIN: "maintainerr.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_maintainerr_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_maintainerr_OAUTH_GROUPS: maintainerr_users
              TINYAUTH_APPS_prowlarr_CONFIG_DOMAIN: "indexers.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_prowlarr_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_prowlarr_OAUTH_GROUPS: prowlarr_users
              TINYAUTH_APPS_qbittorrent_CONFIG_DOMAIN: "bt.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_qbittorrent_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_qbittorrent_OAUTH_GROUPS: qbittorrent_users
              TINYAUTH_APPS_radarr_CONFIG_DOMAIN: "movies.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_radarr_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_radarr_OAUTH_GROUPS: radarr_users
              TINYAUTH_APPS_seerr_CONFIG_DOMAIN: "reqs.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_seerr_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_seerr_OAUTH_GROUPS: seerr_users
              TINYAUTH_APPS_sonarr_CONFIG_DOMAIN: "shows.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_sonarr_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_sonarr_OAUTH_GROUPS: sonarr_users
              TINYAUTH_APPS_subsyncarr_CONFIG_DOMAIN: "subsync.${PUBLIC_DOMAIN}"
              TINYAUTH_APPS_subsyncarr_OAUTH_WHITELIST: "/.*/"
              TINYAUTH_APPS_subsyncarr_OAUTH_GROUPS: subsyncarr_users
            envFrom:
              - secretRef:
                  name: tinyauth-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: tinyauth
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: tinyauth
        advancedMounts:
          tinyauth:
            app:
              - path: /data
      tmp:
        type: emptyDir
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "false"
        hostnames:
          - "auth.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
