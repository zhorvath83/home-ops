---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# Primary defense for the ext-auth endpoint; backs the wide TRUSTEDPROXIES CIDR.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tinyauth
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tinyauth
      app.kubernetes.io/instance: tinyauth
      app.kubernetes.io/controller: tinyauth
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: networking
          matchExpressions:
            - key: gateway.networking.k8s.io/gateway-name
              operator: In
              values:
                - envoy-external
                - envoy-internal
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
