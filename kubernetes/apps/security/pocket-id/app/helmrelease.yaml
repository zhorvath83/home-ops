---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed (allow-gateway-external + -internal) + prometheus scrape (ServiceMonitor)
      labels:
        ingress.home.arpa/allow-gateway-external: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
        ingress.home.arpa/allow-prometheus: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      pocket-id:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/pocket-id/pocket-id
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2.11.0-distroless@sha256:446624a84743c29f93db2ffbbe19f9059fd9741e0cb2516d31efcc764e131835
            env:
              TZ: "${TIMEZONE}"
              APP_URL: "https://id.${PUBLIC_DOMAIN}"
              PORT: &port 1411
              HOST: 0.0.0.0
              DB_CONNECTION_STRING: "/app/data/pocket-id.db"
              # GeoLite2 mmdb is auto-refreshed on startup + by a cron job; keep it
              # out of the backed-up PVC.
              GEOLITE_DB_PATH: "/app/geolite/GeoLite2-City.mmdb"
              TRUST_PROXY: "10.244.0.0/16"
              ALLOW_INSECURE_CALLBACK_URLS: "false"
              ANALYTICS_DISABLED: "true"
              VERSION_CHECK_DISABLED: "true"
              LOG_LEVEL: info
              LOG_JSON: "true"
              # OTel metrics
              METRICS_ENABLED: "true"
              OTEL_METRICS_EXPORTER: "prometheus"
              OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
              OTEL_EXPORTER_PROMETHEUS_PORT: "9464"
            envFrom:
              - secretRef:
                  name: pocket-id-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 20m
                memory: 96Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: pocket-id
        ports:
          http:
            port: *port
          metrics:
            port: 9464
            targetPort: 9464
    serviceMonitor:
      app:
        serviceName: pocket-id
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    persistence:
      data:
        existingClaim: pocket-id
        advancedMounts:
          pocket-id:
            app:
              - path: /app/data
      geolite:
        type: emptyDir
        advancedMounts:
          pocket-id:
            app:
              - path: /app/geolite
      tmp:
        type: emptyDir
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Pocket-ID
          gethomepage.dev/group: Security
          gethomepage.dev/icon: pocket-id.svg
        hostnames:
          - "id.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
