---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# pocket-id (AD-023): envoy + prometheus ingress via the matching CCNPs; this CNP keeps the tinyauth named-consumer east-west rule (forward-auth token/userinfo) and the MaxMind GeoLite2 egress for the in-app UpdateGeoLiteDB job.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pocket-id
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: pocket-id
      app.kubernetes.io/instance: pocket-id
      app.kubernetes.io/controller: pocket-id
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: security
            app.kubernetes.io/name: tinyauth
      toPorts:
        - ports:
            - port: "1411"
              protocol: TCP
  egress:
    # MaxMind GeoLite2 download; download.maxmind.com 302-redirects to its R2 bucket for the tarball.
    - toFQDNs:
        - matchName: "download.maxmind.com"
        - matchPattern: "*.maxmind.com"
        - matchName: "mm-prod-geoip-databases.a2649acb697e2c09b632799562c076f2.r2.cloudflarestorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
