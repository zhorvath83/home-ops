---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# pocket-id (AD-023): envoy + prometheus ingress via the matching CCNPs; this CNP keeps only the tinyauth named-consumer east-west rule (forward-auth token/userinfo).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pocket-id
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: pocket-id
      app.kubernetes.io/instance: pocket-id
      app.kubernetes.io/controller: pocket-id
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: security
            app.kubernetes.io/name: tinyauth
      toPorts:
        - ports:
            - port: "1411"
              protocol: TCP
