---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ciliumnetworkpolicy.yaml
  - ./certificate.yaml
  - ./helmrelease.yaml
  - ./backendtlspolicy.yaml
# kanidm-theme ConfigMap from override.css; fixed name so the HR mount resolves,
# reloader rolls the pod on change (subPath mounts don't live-update).
configMapGenerator:
  - name: kanidm-theme
    files:
      - ./config/override.css
  - name: kanidm-config
    files:
      - ./config/server.toml
generatorOptions:
  disableNameSuffixHash: true
