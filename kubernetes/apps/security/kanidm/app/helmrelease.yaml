---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kanidm
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed via both gateways (ingress enforced by the
      # ingress-from-gateway-* CCNPs selecting these labels) + custom-egress opt-out.
      # kanidm has no legitimate egress, so no per-app CNP — the opt-out label excludes
      # it from allow-cluster-egress and allow-world-egress, leaving DNS-only egress
      # granted by the cluster-wide allow-dns-egress CCNP (default-deny already on).
      labels:
        egress.home.arpa/custom-egress: "true"
        ingress.home.arpa/allow-gateway-external: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      kanidm:
        type: statefulset
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=docker.io/kanidm/server
              repository: docker.io/kanidm/server
              tag: 1.10.4
            env: []
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: &port 8443
                    scheme: HTTPS
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        controller: kanidm
        ports:
          http:
            port: *port
          ldap:
            port: 3636
    persistence:
      data:
        existingClaim: kanidm
        globalMounts:
          - path: /data
            subPath: data
      config:
        type: configMap
        name: kanidm-config
        globalMounts:
          - path: /data/server.toml
            subPath: server.toml
            readOnly: true
      certs:
        type: secret
        name: kanidm-tls
        defaultMode: 0400
        globalMounts:
          - path: /certs
      # web-UI theme, served by kanidm at /pkg/* (loaded last in <head>).
      # override.css + style.js are subPath-mounted onto individual files in
      # kanidm's /hpkg; style.js overrides upstream's to keep <meta theme-color>
      # in sync per mode. icons/ is dir-mounted so /pkg/icons/<name> resolves.
      theme:
        type: configMap
        name: kanidm-theme
        globalMounts:
          - path: /hpkg/override.css
            subPath: override.css
            readOnly: true
          - path: /hpkg/style.js
            subPath: style.js
            readOnly: true
      theme-icons:
        type: configMap
        name: kanidm-icons
        globalMounts:
          - path: /hpkg/icons
            readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/run
            subPath: var-run
    route:
      app:
        hostnames:
          - idm.${PUBLIC_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
