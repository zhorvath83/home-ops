---
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: kopia-daily-maintenance
spec:
  enabled: true
  # AD-023: kopia maintenance pods talk to OVH S3 (world egress)
  moverPodLabels:
    egress.home.arpa/allow-world: "true"
  repository:
    repository: volsync-secret
  trigger:
    # "30 */6 * * *" = minute 30 past every 6th hour (00:30, 06:30, 12:30, 18:30 UTC), 4 runs/day.
    schedule: "30 */6 * * *"
