---
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: kopia-daily-maintenance
spec:
  enabled: true
  # AD-023: kopia maintenance pods talk to OVH S3 (world egress)
  moverPodLabels:
    egress.home.arpa/allow-world: "true"
  repository:
    repository: volsync-secret
  trigger:
    schedule: "30 3,15 * * *"
