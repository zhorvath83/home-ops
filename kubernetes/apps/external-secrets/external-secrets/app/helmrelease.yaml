---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: external-secrets
  values:
    # Chart defaults: seccompProfile=RuntimeDefault, runAsNonRoot, readOnlyRootFS, drop ALL.
    image:
      repository: ghcr.io/external-secrets/external-secrets
    installCRDs: true
    # AD-023 vocabulary: custom-egress (per-app CNP) + prometheus scrape (ServiceMonitor)
    podLabels:
      egress.home.arpa/custom-egress: "true"
      ingress.home.arpa/allow-prometheus: "true"
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        memory: 256Mi
    serviceMonitor:
      enabled: true
      interval: 1m
    certController:
      image:
        repository: ghcr.io/external-secrets/external-secrets
      podLabels:
        egress.home.arpa/custom-egress: "true"
        ingress.home.arpa/allow-prometheus: "true"
      resources:
        requests:
          cpu: 5m
          memory: 96Mi
        limits:
          memory: 256Mi
      serviceMonitor:
        enabled: true
        interval: 1m
    webhook:
      image:
        repository: ghcr.io/external-secrets/external-secrets
      podLabels:
        egress.home.arpa/custom-egress: "true"
        ingress.home.arpa/allow-prometheus: "true"
      resources:
        requests:
          cpu: 1m
          memory: 48Mi
        limits:
          memory: 128Mi
      serviceMonitor:
        enabled: true
        interval: 1m
    grafanaDashboard:
      enabled: true
