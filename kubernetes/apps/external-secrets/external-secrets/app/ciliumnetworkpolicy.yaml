---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# ESO no-world (AD-023) — reads/writes Secrets cluster-wide; prometheus scrape via the ingress-from-prometheus CCNP.
# Controller fetches values THROUGH onepassword-connect, never directly to 1Password. DNS via the cluster-wide allow-dns-egress CCNP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: external-secrets
            app: onepassword-connect
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# ESO cert-controller no-world (AD-023): prometheus scrape via the ingress-from-prometheus CCNP; manages the webhook CA bundle via kube-apiserver only.
# kubelet healthz probe (8081) rides the local-host fast-path, no explicit rule needed.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-cert-controller
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-cert-controller
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# ESO webhook no-world (AD-023): prometheus scrape via the ingress-from-prometheus CCNP; pure admission server, initiates no egress (DNS via the cluster-wide CCNP).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-webhook
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
            - port: "8081"
              protocol: TCP
