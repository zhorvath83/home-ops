---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
spec:
  chartRef:
    kind: OCIRepository
    name: onepassword-connect
  interval: 30m
  install:
    remediation:
      retries: 4
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 4
  uninstall:
    keepHistory: false
  values:
    # Chart defaults handle security: seccompProfile=RuntimeDefault, runAsNonRoot,
    # readOnlyRootFilesystem, drop ALL caps, UID/GID 999.
    connect:
      annotations:
        reloader.stakater.com/auto: "true"
      api:
        httpPort: 8080
        imageRepository: ghcr.io/1password/connect-api
        resources:
          requests:
            cpu: 2m
            memory: 24M
          limits:
            memory: 128M
        serviceMonitor:
          enabled: true
      sync:
        imageRepository: ghcr.io/1password/connect-sync
        resources:
          requests:
            cpu: 2m
            memory: 16M
          limits:
            memory: 128M
      credentialsName: onepassword-connect-credentials
