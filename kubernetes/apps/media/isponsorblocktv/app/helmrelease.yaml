---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: isponsorblocktv
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: internet egress (YouTube/Google + ctrld DoH) via the allow-world-egress CCNP
      labels:
        egress.home.arpa/allow-world: "true"
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1
          - ${CLUSTER_DNS_IP}
        options:
          - {name: ndots, value: "1"}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
        sysctls:
          - {name: net.ipv4.ip_unprivileged_port_start, value: "53"}
    controllers:
      isponsorblocktv:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dmunozv04/isponsorblocktv
              tag: v2.10.0@sha256:f2e4c7e57f6fcb490156759bcc79561ac594675354923a71f1f034a3fe39d7de
            env:
              TZ: "${TIMEZONE}"
            probes:
              liveness: {enabled: false}
              readiness: {enabled: false}
              startup: {enabled: false}
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 1m
                memory: 50Mi
              limits:
                memory: 128Mi
          ctrld:
            image:
              repository: docker.io/controldns/ctrld
              tag: 1.5.4@sha256:b3198125154f42baea4c5ee3db76d46c19c57cec88aab934ea50f7661fdc915a
            args:
              - --listen
              - 0.0.0.0:53
              - --primary_upstream
              - https://dns.controld.com/$(CTRLD_RESOLVER_ID)
            env:
              CTRLD_RESOLVER_ID:
                valueFrom:
                  secretKeyRef:
                    name: isponsorblocktv-secret
                    key: CTRLD_RESOLVER_ID
            probes:
              liveness: {enabled: false}
              readiness: {enabled: false}
              startup: {enabled: false}
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 64Mi
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          isponsorblocktv:
            app:
              - path: /app/data
      ctrld-etc:
        type: emptyDir
        advancedMounts:
          isponsorblocktv:
            ctrld:
              - path: /etc/controld
      ctrld-tmp:
        type: emptyDir
        advancedMounts:
          isponsorblocktv:
            ctrld:
              - path: /tmp
