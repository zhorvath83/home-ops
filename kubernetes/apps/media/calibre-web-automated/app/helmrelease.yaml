---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web-automated
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed (ingress-from-gateway-external + -internal CCNPs) + custom-egress (per-app CNP → SMTP2GO only) + allow-gateways (upcoming OIDC hairpin)
      labels:
        ingress.home.arpa/allow-gateway-external: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
        egress.home.arpa/custom-egress: "true"
        egress.home.arpa/allow-gateways: "true"
      securityContext:
        runAsNonRoot: false # because S6 overlay
        runAsUser: 0 # because S6 overlay
        runAsGroup: 0 # because S6 overlay
        seccompProfile:
          type: RuntimeDefault
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      calibre-web-automated:
        annotations:
          reloader.stakater.com/auto: "true"
        # Molyhu metadata-provider DISABLED (AD-023 no-internet posture): the git-sync clone needs github.com egress.
        # Re-enable with a github.com toFQDNs grant in ciliumnetworkpolicy.yaml AND uncomment the molyhu-repo/molyhu-provider
        # persistence volumes below (the app subPath-mounts moly_hu.py from them).
        # initContainers:
        #   01-clone-molyhu:
        #     image:
        #       repository: registry.k8s.io/git-sync/git-sync
        #       tag: v4.7.0@sha256:d232fd13474ba1b46dba431af2b1411b9d9afacda55ae644d2a32e43975128dd
        #     args:
        #       - --repo=https://github.com/crash5/calibre-molyhu
        #       - --ref=main
        #       - --depth=1
        #       - --root=/tmp/molyhu-repo
        #       - --link=calibre-molyhu
        #       - --one-time
        #     resources:
        #       limits:
        #         memory: 128Mi
        #   02-copy-molyhu-provider:
        #     image:
        #       repository: public.ecr.aws/docker/library/busybox
        #       tag: 1.38.0
        #     command:
        #       - /bin/sh
        #       - -c
        #     args:
        #       - |
        #         cp /tmp/molyhu-repo/calibre-molyhu/calibre-web/moly_hu.py /tmp/molyhu-provider/moly_hu.py &&
        #         cp /tmp/molyhu-repo/calibre-molyhu/moly_hu/src/moly_hu/moly_hu.py /tmp/molyhu-provider/moly_hu_provider.py &&
        #         echo "Moly.hu metadata provider files copied and patched successfully."
        #     resources:
        #       requests:
        #         cpu: 5m
        #         memory: 10Mi
        #       limits:
        #         memory: 64Mi
        containers:
          app:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
            env:
              CACHE_DIR: /cache
              TZ: "${TIMEZONE}"
              PUID: 1000
              PGID: 100
              # NFS library: skip the boot-time recursive chown of /calibre-library + disable SQLite WAL + poll watchers
              NETWORK_SHARE_MODE: "true"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  # CWA-init chowns the NFS ebook library on every boot; on a large library this exceeds a normal probe budget.
                  initialDelaySeconds: 60
                  failureThreshold: 120
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: true # because S6 overlay
              readOnlyRootFilesystem: false # because S6 overlay
              capabilities:
                drop:
                  - ALL
                add:
                  # because S6 overlay
                  - CHOWN
                  - SETUID
                  - SETGID
                  - FOWNER
                  - DAC_OVERRIDE
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 768Mi
    service:
      app:
        controller: calibre-web-automated
        ports:
          http:
            port: &port 80
            targetPort: 8083
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/pod-selector: app.kubernetes.io/name=calibre-web-automated
          gethomepage.dev/name: Calibre
          gethomepage.dev/group: Media
          gethomepage.dev/icon: calibre-web.svg
        hostnames:
          - "books.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      config:
        type: persistentVolumeClaim
        existingClaim: calibre-web-automated
        globalMounts:
          - path: /config
      # molyhu-repo / molyhu-provider volumes commented out with the initContainers above (AD-023 no-internet):
      # the app subPath-mounts moly_hu.py from molyhu-provider, which only the disabled copy init populates.
      # molyhu-repo:
      #   type: emptyDir
      #   advancedMounts:
      #     calibre-web-automated:
      #       01-clone-molyhu:
      #         - path: /tmp/molyhu-repo
      #       02-copy-molyhu-provider:
      #         - path: /tmp/molyhu-repo
      #           readOnly: true
      # molyhu-provider:
      #   type: emptyDir
      #   advancedMounts:
      #     calibre-web-automated:
      #       02-copy-molyhu-provider:
      #         - path: /tmp/molyhu-provider
      #       app:
      #         - path: /app/calibre-web-automated/cps/metadata_provider/moly_hu.py
      #           subPath: moly_hu.py
      #           readOnly: true
      #         - path: /app/calibre-web-automated/cps/metadata_provider/moly_hu_provider.py
      #           subPath: moly_hu_provider.py
      #           readOnly: true
      nfs-calibre-library:
        type: nfs
        server: ${NAS_IP}
        path: /backups/documents/personal/ebooks
        globalMounts:
          - path: /calibre-library
