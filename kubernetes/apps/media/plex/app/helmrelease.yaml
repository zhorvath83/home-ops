---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: ingress-none CCNP for ingress default-deny (plex is LB-only, no HTTPRoute — the gateways CCNP's envoy admitt would be a no-op) + internet egress (plex.tv) via the allow-world-egress CCNP
      labels:
        ingress.home.arpa/none: "true"
        egress.home.arpa/allow-world: "true"
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: "${APP}-gpu"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      plex:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.2.10687@sha256:be00a2ad851ea3193cd870636f908eb6425ad89390f23cdb08daa35ab5cceacc
            env:
              TZ: "${TIMEZONE}"
              HOSTNAME: PlexServer
              PLEX_ADVERTISE_URL: "http://${PLEX_IP}:32400"
              PLEX_NO_AUTH_NETWORKS: ${LAN_SUBNET},${IOT_SUBNET},${POD_CIDR},${SVC_CIDR}
            envFrom:
              - secretRef:
                  name: plex-secret
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
                  tcpSocket:
                    port: *port
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 25m
                memory: 160Mi
              limits:
                memory: 4096Mi
    service:
      app:
        controller: plex
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "${PLEX_IP}"
        ports:
          http:
            port: *port
          # Plex DLNA Server
          # https://support.plex.tv/articles/200350536-dlna/
          # dnla-tcp:
          #   port: 32469
          #   protocol: TCP
          # dnla-udp:
          #   port: 1900
          #   protocol: UDP
          # GDM Network discovery
          # https://support.plex.tv/articles/200430283-network/
          gdm-1-udp:
            port: 32410
            protocol: UDP
          gdm-2-udp:
            port: 32412
            protocol: UDP
          gdm-3-udp:
            port: 32413
            protocol: UDP
          gdm-4-udp:
            port: 32414
            protocol: UDP
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: plex
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server
      # Keep the small, stateful Plex core on the main PVC and mount
      # large, rebuildable directories from a separate PVC.
      # For existing installs, pre-populate these subPaths on
      # plex-rebuildable before enabling the mounts, otherwise the empty
      # PVC will mask the current Metadata/Cache/Scanners directories and
      # Plex will rebuild them from scratch.
      rebuildable:
        existingClaim: plex-rebuildable
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Cache
                subPath: cache
              - path: /config/Library/Application Support/Plex Media Server/Metadata
                subPath: metadata
              - path: /config/Library/Application Support/Plex Media Server/Scanners
                subPath: scanners
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs
      nfs-media:
        type: nfs
        server: ${NAS_IP}
        path: /media
        globalMounts:
          - path: /media
      transcode:
        type: emptyDir
        globalMounts:
          - path: /transcode
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
