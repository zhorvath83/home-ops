---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: subsyncarr
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: subsyncarr
  path: ./kubernetes/apps/default/subsyncarr/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  targetNamespace: default
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP_UID: "1000"
      APP_GID: "1000"
