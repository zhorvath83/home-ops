---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resticprofile
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: resticprofile-secret
    creationPolicy: Owner
    template:
      data:
        # resticprofile
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        RESTIC_REPOSITORY: "s3:https://{{ .ovh_s3_endpoint }}/{{ .RESTIC_S3_BUCKET }}"
        AWS_ACCESS_KEY_ID: "{{ .ovh_s3_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ .ovh_s3_secret_key }}"
        HEALTHCHECK_BACKUPS_WEBHOOK: "{{ .HEALTHCHECK_BACKUPS_WEBHOOK }}"
        HEALTHCHECK_BACKUPS_CHECK_WEBHOOK: "{{ .HEALTHCHECK_BACKUPS_CHECK_WEBHOOK }}"
  dataFrom:
    - extract:
        key: resticprofile
    - extract:
        key: ovh
