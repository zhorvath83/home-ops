---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: resticprofile
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: resticprofile
  dependsOn:
    - name: onepassword-store
    - name: democratic-csi
  path: ./kubernetes/apps/default/resticprofile/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  targetNamespace: default
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP_UID: "0"
      APP_GID: "0"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: restic-gui
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: restic-gui
  dependsOn:
    - name: onepassword-store
    - name: democratic-csi
  path: ./kubernetes/apps/default/resticprofile/gui
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  targetNamespace: default
  timeout: 5m
  wait: false
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: backrest
      APP_UID: "0"
      APP_GID: "0"
