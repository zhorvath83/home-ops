---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qbittorrent-p2pblocklist
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: qbittorrent-p2pblocklist
  dependsOn:
    - name: democratic-csi
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/default/qbittorrent-p2pblocklist/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  timeout: 5m
  wait: false
