---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: onepassword-connect
      namespace: external-secrets
    - name: democratic-csi
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/default/paperless/app
  postBuild:
    substitute:
      APP: paperless
      APP_UID: "1000"
      APP_GID: "1000"
      VOLSYNC_CAPACITY: "20Gi"
      VOLSYNC_CACHE: "2Gi"
      VOLSYNC_RETAIN_DAILY: "7"
      VOLSYNC_RETAIN_WEEKLY: "4"
      VOLSYNC_RETAIN_MONTHLY: "12"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  timeout: 5m
  wait: false
