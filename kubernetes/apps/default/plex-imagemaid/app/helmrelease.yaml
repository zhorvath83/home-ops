---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-imagemaid
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: plex-imagemaid

  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false

  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: ["plex"]
              topologyKey: kubernetes.io/hostname

    controllers:
      plex-imagemaid:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: plex-imagemaid
        type: cronjob
        cronjob:
          schedule: "30 7 * * *"
          timeZone: Europe/Budapest
          concurrencyPolicy: Forbid

        containers:
          app:
            image:
              repository: docker.io/kometateam/imagemaid
              tag: v1.1.1@sha256:fbec331b36c1473f8a9c4214f55e5b097860476c8a5274eb61a2b85df89e56cc
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                echo "Preparing kubectl"

                ARCH="$(uname -m)"
                case "${ARCH}" in
                  x86_64|amd64) KUBECTL_ARCH="amd64" ;;
                  aarch64|arm64) KUBECTL_ARCH="arm64" ;;
                  *)
                    echo "Unsupported architecture: ${ARCH}"
                    exit 1
                    ;;
                esac

                KUBECTL_BIN="/tmp/kubectl"
                curl --fail --silent --show-error --location \
                  "https://dl.k8s.io/release/v1.32.2/bin/linux/${KUBECTL_ARCH}/kubectl" \
                  --output "${KUBECTL_BIN}"
                chmod +x "${KUBECTL_BIN}"

                echo "Reading current Plex replica count"
                ORIGINAL_REPLICAS="$("${KUBECTL_BIN}" get deployment plex --namespace default --output jsonpath='{.spec.replicas}')"
                if [ -z "${ORIGINAL_REPLICAS}" ]; then
                  ORIGINAL_REPLICAS="1"
                fi

                restore_plex() {
                  if [ "${ORIGINAL_REPLICAS}" != "0" ]; then
                    "${KUBECTL_BIN}" scale deployment plex --namespace default --replicas="${ORIGINAL_REPLICAS}"
                    "${KUBECTL_BIN}" rollout status deployment/plex --namespace default --timeout=10m
                  fi
                }

                trap restore_plex EXIT

                if [ "${ORIGINAL_REPLICAS}" != "0" ]; then
                  echo "Scaling Plex down"
                  "${KUBECTL_BIN}" scale deployment plex --namespace default --replicas=0
                  while "${KUBECTL_BIN}" get pods --namespace default --selector app.kubernetes.io/name=plex --output name | grep -q .; do
                    sleep 5
                  done
                fi

                echo "Running ImageMaid"
                python3 /imagemaid.py

            env:
              TZ: Europe/Budapest
              PLEX_PATH: /data/plex_config
              MODE: report
              LOCAL_DB: "true"
              IGNORE_RUNNING: "false"
              PHOTO_TRANSCODER: "true"

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi

    persistence:
      plex:
        existingClaim: plex
        globalMounts:
          - path: /data/plex_config

      plex-cache:
        existingClaim: plex-cache
        globalMounts:
          - path: /data/plex_config/Cache

      config:
        type: emptyDir

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    serviceAccount:
      plex-imagemaid: {}

    rbac:
      roles:
        plex-imagemaid:
          enabled: true
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "patch"]
      bindings:
        plex-imagemaid:
          enabled: true
          type: RoleBinding
          roleRef:
            identifier: plex-imagemaid
          subjects:
            - kind: ServiceAccount
              name: plex-imagemaid
              namespace: "{{ .Release.Namespace }}"

    service:
      app:
        controller: plex-imagemaid
        enabled: false
