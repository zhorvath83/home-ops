---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-imagemaid
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: plex-imagemaid

  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false

  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: ["plex"]
              topologyKey: kubernetes.io/hostname

    controllers:
      plex-imagemaid:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: plex-imagemaid
        type: cronjob
        cronjob:
          schedule: "30 7 * * *"
          timeZone: Europe/Budapest
          concurrencyPolicy: Forbid

        initContainers:
          kubectl:
            image:
              repository: docker.io/alpine/k8s
              tag: 1.35.2@sha256:9a87b09e1b6d887fa52c2dea1611d112d9e7d3d0271708588711a2fb2016e82c
            command:
              - /bin/sh
              - -c
              - |
                cp /usr/bin/kubectl /shared/kubectl
                chmod +x /shared/kubectl
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 30Mi
              limits:
                memory: 64Mi

        containers:
          app:
            image:
              repository: docker.io/kometateam/imagemaid
              tag: v1.1.1@sha256:fbec331b36c1473f8a9c4214f55e5b097860476c8a5274eb61a2b85df89e56cc
            command:
              - /bin/sh
              - -c
              - |
                set -eu

                KUBECTL_BIN="/shared/kubectl"

                echo "Reading current Plex replica count"
                ORIGINAL_REPLICAS="$("${KUBECTL_BIN}" get deployment plex --namespace default --output jsonpath='{.spec.replicas}')"
                if [ -z "${ORIGINAL_REPLICAS}" ]; then
                  ORIGINAL_REPLICAS="1"
                fi

                restore_plex() {
                  if [ "${ORIGINAL_REPLICAS}" != "0" ]; then
                    "${KUBECTL_BIN}" scale deployment plex --namespace default --replicas="${ORIGINAL_REPLICAS}"
                    "${KUBECTL_BIN}" rollout status deployment/plex --namespace default --timeout=10m
                  fi
                }

                trap restore_plex EXIT

                if [ "${ORIGINAL_REPLICAS}" != "0" ]; then
                  echo "Scaling Plex down"
                  "${KUBECTL_BIN}" scale deployment plex --namespace default --replicas=0
                  while "${KUBECTL_BIN}" get pods --namespace default --selector app.kubernetes.io/name=plex --output name | grep -q .; do
                    sleep 5
                  done
                fi

                echo "Running ImageMaid"
                python3 /imagemaid.py

            env:
              TZ: Europe/Budapest
              PLEX_PATH: /data/plex_config
              MODE: report
              LOCAL_DB: "true"
              IGNORE_RUNNING: "false"
              PHOTO_TRANSCODER: "true"

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi

    persistence:
      plex:
        existingClaim: plex
        globalMounts:
          - path: /data/plex_config

      plex-cache:
        existingClaim: plex-cache
        globalMounts:
          - path: /data/plex_config/Cache

      shared:
        type: emptyDir
        globalMounts:
          - path: /shared

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    serviceAccount:
      plex-imagemaid: {}

    rbac:
      roles:
        plex-imagemaid:
          enabled: true
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "patch"]
      bindings:
        plex-imagemaid:
          enabled: true
          type: RoleBinding
          roleRef:
            identifier: plex-imagemaid
          subjects:
            - kind: ServiceAccount
              name: plex-imagemaid
              namespace: "{{ .Release.Namespace }}"

    service:
      app:
        controller: plex-imagemaid
        enabled: false
