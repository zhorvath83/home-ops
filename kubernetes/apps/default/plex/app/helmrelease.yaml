---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: plex

  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false

  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    controllers:
      plex:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.1.10611@sha256:a9c3723cb31cc9621df27cf5801184c290293adf1df2bfaea4b8b6fc01dbfd96


            env:
              TZ: "Europe/Budapest"
              HOSTNAME: PlexServer
              PLEX_ADVERTISE_URL: "https://plex.horvathzoltan.me,http://192.168.1.20:32400"
              PLEX_NO_AUTH_NETWORKS: 192.168.1.0/24,192.168.2.0/24,10.42.0.0/16,10.43.0.0/16

            envFrom:
              - secretRef:
                  name: plex-secret

            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5

              readiness: *probes

              startup:
                enabled: true
                custom: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
                  tcpSocket:
                    port: *port

            resources:
              requests:
                cpu: 25m
                memory: 160Mi
              limits:
                memory: 4096Mi

    service:
      app:
        controller: plex
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "192.168.1.20"
        ports:
          http:
            port: *port
          # Plex DLNA Server
          # https://support.plex.tv/articles/200350536-dlna/
          # dnla-tcp:
          #   port: 32469
          #   protocol: TCP
          # dnla-udp:
          #   port: 1900
          #   protocol: UDP
          # GDM Network discovery
          # https://support.plex.tv/articles/200430283-network/
          gdm-1-udp:
            port: 32410
            protocol: UDP
          gdm-2-udp:
            port: 32412
            protocol: UDP
          gdm-3-udp:
            port: 32413
            protocol: UDP
          gdm-4-udp:
            port: 32414
            protocol: UDP

    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: plex
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server

      # Keep the small, stateful Plex core on the main PVC and mount
      # large, rebuildable directories from a separate PVC.
      # For existing installs, pre-populate these subPaths on
      # plex-rebuildable before enabling the mounts, otherwise the empty
      # PVC will mask the current Metadata/Cache/Scanners directories and
      # Plex will rebuild them from scratch.
      rebuildable:
        existingClaim: plex-rebuildable
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Cache
                subPath: cache
              - path: /config/Library/Application Support/Plex Media Server/Metadata
                subPath: metadata
              - path: /config/Library/Application Support/Plex Media Server/Scanners
                subPath: scanners

      logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs

      nfs-media:
        type: nfs
        server: 192.168.1.10
        path: /media
        globalMounts:
          - path: /media

      transcode:
        type: emptyDir
        globalMounts:
          - path: /transcode

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
