---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: plex
  dependsOn:
    - name: onepassword-connect
    - name: democratic-csi
  path: ./kubernetes/apps/default/plex/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  targetNamespace: default
  timeout: 5m
  wait: false
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: plex
      VOLSYNC_CAPACITY: "5Gi"
      VOLSYNC_CACHE: "2Gi"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex-trakt-sync
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: plex-trakt-sync
  dependsOn:
    - name: onepassword-connect
    - name: democratic-csi
  path: ./kubernetes/apps/default/plex/trakt-sync
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  targetNamespace: default
  timeout: 5m
  wait: false
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: plex-trakt-sync
