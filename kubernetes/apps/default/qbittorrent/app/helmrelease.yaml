---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      hostname: qbittorrent
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-copy-config:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: 1.38.0
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              limits:
                memory: 64Mi
            command:
              - "/bin/sh"
              - -c
            args:
              - |
                echo "Creating directory /config/qBittorrent/" &&
                mkdir -p /config/qBittorrent/ &&
                echo "Copying files from /tmp/configfiles/ to /config/qBittorrent/" &&
                cp /tmp/configfiles/* /config/qBittorrent/ &&
                echo "Appending WebUI password from secret..." &&
                echo "WebUI\\Password_PBKDF2=$(cat /secrets/qbittorrent/password_pbkdf2)" >> /config/qBittorrent/qBittorrent.conf &&
                echo "Init complete."
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.1@sha256:8d58d9ad18a1fb5e556e68bde7ac06046847cc97069257f01d2e1ec0d27ff019
            env:
              TZ: "${TIMEZONE}"
              QBT_WEBUI_PORT: &port 8080
              QBT_TORRENTING_PORT: &torrentPort 62418
            nameOverride: qbittorrent
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 300Mi
              limits:
                memory: 3000Mi
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: *port
          bittorrent-tcp:
            port: *torrentPort
            protocol: TCP
          bittorrent-udp:
            port: *torrentPort
            protocol: UDP
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: qBt
          gethomepage.dev/group: Downloading
          gethomepage.dev/icon: qbittorrent.svg
        hostnames:
          - "bt.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: qbittorrent
        globalMounts:
          - path: /config
      configfiles:
        type: configMap
        name: qbittorrent-configmap
        globalMounts:
          - path: /tmp/configfiles
      secret:
        type: secret
        name: qbittorrent-secret
        globalMounts:
          - path: /secrets/qbittorrent
            readOnly: true
      nfs-nas-media:
        type: nfs
        server: ${NAS_IP}
        path: /media
        globalMounts:
          - path: /media
