---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/_/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-gallery
# Intentionally excluded from VolSync backups: this PVC only stores generated
# thumbnails and the local app database, while the source photos live on NFS.
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: democratic-csi-local-hostpath
