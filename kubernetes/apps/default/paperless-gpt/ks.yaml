---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-gpt
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless-gpt
  dependsOn:
    - name: onepassword-connect
    - name: democratic-csi
    - name: paperless
  path: ./kubernetes/apps/default/paperless-gpt/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  targetNamespace: default
  timeout: 5m
  wait: false
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: paperless-gpt
