---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-config-files
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: homepage-config-files-secret
    creationPolicy: Owner
    template:
      data:
        # null/empty config files — homepage uses defaults when these are empty strings
        bookmarks.yaml: ""
        docker.yaml: ""
        proxmox.yaml: ""
        custom.css: ""
        custom.js: ""
        # Populated config files — sourced from 1Password homepage-config item
        kubernetes.yaml: "{{ .kubernetes_yaml }}"
        services.yaml: "{{ .services_yaml }}"
        settings.yaml: "{{ .settings_yaml }}"
        widgets.yaml: "{{ .widgets_yaml }}"
  dataFrom:
    - extract:
        key: homepage-config
