---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: homepage-secret
    creationPolicy: Owner
    template:
      data:
        # Env var (consumed via envFrom; valid env name)
        HOMEPAGE_VAR_OWM_API_TOKEN: "{{ .OWM_API_TOKEN }}"
        # File mount (key contains a dot, envFrom skips it with a warning)
        services.yaml: "{{ .services_yaml }}"
  dataFrom:
    - extract:
        key: openweathermap
    - extract:
        key: homepage
