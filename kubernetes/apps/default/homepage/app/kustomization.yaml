---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./externalsecret.yaml

labels:
  - pairs:
      app.kubernetes.io/name: homepage

configMapGenerator:
  - name: homepage-config-files
    files:
      - config/kubernetes.yaml
      - config/settings.yaml
      - config/widgets.yaml
      - config/bookmarks.yaml
      - config/docker.yaml
      - config/proxmox.yaml
      - config/custom.css
      - config/custom.js

generatorOptions:
  disableNameSuffixHash: true
