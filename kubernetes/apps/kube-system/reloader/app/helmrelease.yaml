---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: &namespace kube-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: reloader

  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    # Chart defaults: pod=seccompProfile+runAsNonRoot, but containerSecurityContext is empty.
    # Adding container hardening explicitly below.
    reloader:
      podMonitor:
        enabled: false
        namespace: *namespace
      deployment:
        containerSecurityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 1m
            memory: 128Mi
          limits:
            memory: 512Mi
