---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: reloader
  values:
    # Chart defaults: pod=seccompProfile+runAsNonRoot, but containerSecurityContext is empty.
    # Adding container hardening explicitly below.
    reloader:
      podMonitor:
        enabled: true
        namespace: kube-system
      deployment:
        containerSecurityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 1m
            memory: 128Mi
          limits:
            memory: 512Mi
