---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: metrics-server
  values:
    # Chart defaults: seccompProfile=RuntimeDefault, runAsNonRoot, readOnlyRootFS, drop ALL.
    env:
      TZ: "Europe/Budapest"
    args:
      - --kubelet-insecure-tls
      - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
      - --kubelet-use-node-status-port
      - --metric-resolution=15s
      - --kubelet-request-timeout=2s
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        memory: 256Mi
    metrics:
      enabled: true
    serviceMonitor:
      enabled: true
