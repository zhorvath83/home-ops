---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumclusterwidenetworkpolicy_v2.json
#
# Cluster-wide baseline egress policy (bjw-s-labs pattern).
#
# Default model: every pod without the opt-out label receives in-cluster egress
# only — cluster endpoints + kube-apiserver (post-V3 flip; public internet is no
# longer in the baseline, it is granted by egress.home.arpa/allow-world or a
# per-app CNP). This makes `CiliumNetworkPolicy` opt-in for the remaining egress
# rules instead of forcing every pod to repeat DNS / cluster / world egress.
#
# Opt-out: label a pod or workload with
#   egress.home.arpa/custom-egress: "true"
# to remove it from this baseline. (The selector keys off the label's existence,
# so any value works; "true" is convention.) Any per-app CNP attached to that pod then
# becomes the sole source of egress allow rules — and the pod falls back to
# default-deny for any egress not explicitly listed there.
#
# Companion policy: `allow-dns-egress` (applies to ALL pods, including opted-
# out ones; DNS allowance via L7 proxy is a separate concern).
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-cluster-egress
spec:
  endpointSelector:
    matchExpressions:
      - key: egress.home.arpa/custom-egress
        operator: DoesNotExist
  egress:
    - toEndpoints:
        - {}
    - toEntities:
        - cluster
    - toEntities:
        - kube-apiserver # explicit: probe-identity caution (AD-023)
