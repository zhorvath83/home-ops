---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumclusterwidenetworkpolicy_v2.json
#
# Egress to the envoy gateway proxies (label egress.home.arpa/allow-gateways="true").
# For custom-egress pods that consume cluster-hosted services via their public
# hostnames — canonically the public-issuer OIDC hairpin (AD-023 rev4).
# Baseline pods reach envoy through allow-cluster-egress and need no label.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-gateways-egress
spec:
  endpointSelector:
    matchLabels:
      egress.home.arpa/allow-gateways: "true"
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: networking
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "10443"
              protocol: TCP
