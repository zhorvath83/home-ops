---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumclusterwidenetworkpolicy_v2.json
#
# Ingress from envoy-external/envoy-internal proxies (label
# ingress.home.arpa/gateways="true"). Staged with enableDefaultDeny false
# in V1 — remove that block in the V1 activation commit to close ingress.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: ingress-from-gateways
spec:
  endpointSelector:
    matchLabels:
      ingress.home.arpa/gateways: "true"
  enableDefaultDeny:
    ingress: false
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: networking
            app.kubernetes.io/name: envoy
          matchExpressions:
            - key: gateway.envoyproxy.io/owning-gateway-name
              operator: In
              values:
                - envoy-external
                - envoy-internal
