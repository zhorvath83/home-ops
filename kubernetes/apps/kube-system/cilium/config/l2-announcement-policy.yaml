---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/cilium.io/ciliuml2announcementpolicy_v2alpha1.json
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default
spec:
  loadBalancerIPs: true
  interfaces:
    - ^bond[0-9]+$
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  serviceSelector:
    matchExpressions:
      - key: policy.cilium.io/exclude
        operator: NotIn
        values: ["true"]
