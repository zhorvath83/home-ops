---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
# Cilium dashboards are emitted as ConfigMaps by the cilium Helm chart
# (dashboards.enabled / operator.dashboards.enabled); referenced here by name
# so the operator imports them into the Grafana instance.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cilium-dashboard
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  allowCrossNamespaceImport: true
  folderRef: cilium
  configMapRef:
    name: cilium-dashboard
    key: cilium-dashboard.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cilium-operator-dashboard
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  allowCrossNamespaceImport: true
  folderRef: cilium
  configMapRef:
    name: cilium-operator-dashboard
    key: cilium-operator-dashboard.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
