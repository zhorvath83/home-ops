---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: democratic-csi
  values:
    # NOTE: Chart sets NO securityContext by default. CSI drivers require
    # privileged access for volume operations — hardening not applicable here.
    env:
      TZ: "${TIMEZONE}"
    controller:
      # democratic-csi controller
      enabled: true
      replicaCount: 1
      strategy: node
      driver:
        enabled: true
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          tag: v1.9.5@sha256:746bf6b373ae75f5da8b1e412d13c3e8d0e2e1494654268b9dd6fe1f1e55aade
      externalProvisioner:
        enabled: true
        image:
          registry: registry.k8s.io/sig-storage/csi-provisioner
          tag: v5.2.0
        extraArgs:
          - --leader-election=false
          - --node-deployment=true
          - --node-deployment-immediate-binding=false
          - --feature-gates=Topology=true
          - --strict-topology=true
          - --enable-capacity=true
          - --capacity-ownerref-level=1
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 256Mi
      externalAttacher:
        enabled: false
      externalResizer:
        enabled: false
      externalSnapshotter:
        enabled: true
        image:
          registry: registry.k8s.io/sig-storage/csi-snapshotter
          tag: v8.2.1
        extraArgs:
          - --leader-election=false
          # - --node-deployment=true
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 256Mi
      externalHealthMonitorController:
        enabled: false
    node:
      # democratic-csi node
      enabled: true
      cleanup:
        image:
          registry: public.ecr.aws/docker/library/busybox
          tag: 1.38.0
        resources:
          requests:
            cpu: 5m
            memory: 5Mi
          limits:
            memory: 256Mi
      driver:
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          tag: v1.9.5@sha256:746bf6b373ae75f5da8b1e412d13c3e8d0e2e1494654268b9dd6fe1f1e55aade
        resources:
          requests:
            cpu: 60m
            memory: 256Mi
          limits:
            memory: 1Gi
        extraVolumeMounts:
          - name: local-storage
            mountPath: /var/mnt/local-hostpath
            mountPropagation: Bidirectional
      extraVolumes:
        - name: local-storage
          hostPath:
            path: /var/mnt/local-hostpath
            type: DirectoryOrCreate
      driverRegistrar:
        enabled: true
        image:
          registry: registry.k8s.io/sig-storage/csi-node-driver-registrar
          tag: v2.17.0
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 256Mi
    csiProxy:
      enabled: true
      image:
        registry: ghcr.io/democratic-csi/csi-grpc-proxy
        tag: v0.5.7@sha256:78e86badadfe67a9afdbe2c9a3afc02bc50aa43b86203c9ca6fc046ab3519e3f
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          memory: 256Mi
    csiDriver:
      name: "org.democratic-csi.local-hostpath"
      attachRequired: false
      storageCapacity: true
      fsGroupPolicy: File
    driver:
      config:
        driver: local-hostpath
        instance_id:
        local-hostpath:
          shareBasePath: "/var/mnt/local-hostpath"
          controllerBasePath: "/var/mnt/local-hostpath"
          dirPermissionsMode: "0777"
          dirPermissionsUser: 0
          dirPermissionsGroup: 0
    storageClasses:
      - name: democratic-csi-local-hostpath
        defaultClass: true
        reclaimPolicy: Delete
        volumeBindingMode: WaitForFirstConsumer
        allowVolumeExpansion: false
