---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  chartRef:
    kind: OCIRepository
    name: coredns
  interval: 30m
  values:
    fullnameOverride: coredns
    image:
      repository: mirror.gcr.io/coredns/coredns
    replicaCount: 1
    k8sAppLabelOverride: kube-dns
    serviceAccount:
      create: true
    service:
      name: kube-dns
      clusterIP: ${CLUSTER_DNS_IP}
    servers:
      # id.* → envoy-internal ClusterIP (not its LB VIP): the proxy pod backs that VIP and
      # can't hairpin to it (eTP:Local), which breaks native SecurityPolicy.oidc token exchange.
      # More specific zone than the ${PUBLIC_DOMAIN} block below, so it wins for id.*.
      - zones:
          - zone: id.${PUBLIC_DOMAIN}
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: rewrite
            parameters: name exact id.${PUBLIC_DOMAIN} envoy-internal.networking.svc.cluster.local
          - name: kubernetes
            parameters: cluster.local
          - name: cache
      # Split horizon for pods: the public domain resolves via k8s-gateway (envoy VIP) instead of
      # the node resolver → router hop; keeps public-issuer OIDC hairpins router-independent.
      - zones:
          - zone: ${PUBLIC_DOMAIN}
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: forward
            parameters: . ${K8S_GATEWAY_IP}
          - name: cache
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          # autopath rewrites query names (CNAME chain), which Cilium fails to
          # correlate to per-app toFQDNs egress allowlists — breaks narrow-world CNPs.
          # - name: autopath
          #   parameters: "@kubernetes"
          - name: forward
            parameters: . /etc/resolv.conf
          - name: cache
            configBlock: |-
              prefetch 20
              serve_stale
          - name: loop
          - name: reload
          - name: loadbalance
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: log
            configBlock: |-
              class error
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
