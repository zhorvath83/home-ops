---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# coredns (AD-023): baseline no longer grants world after the V3 flip, so coredns
# needs an explicit grant for its upstream forwarders (forward . /etc/resolv.conf).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: coredns
spec:
  endpointSelector:
    matchLabels:
      k8s-app: kube-dns
  egress:
    # Upstream DNS — toEntities: world covers both public resolvers and the LAN router.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
