---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: snapshot-controller
  values:
    # Chart defaults: container=runAsNonRoot+readOnlyRootFS+drop ALL, but NO seccompProfile.
    # Adding seccompProfile via podSecurityContext on the controller.
    controller:
      podSecurityContext:
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 5m
          memory: 48Mi
        limits:
          memory: 128Mi
      serviceMonitor:
        create: true
    # Disable the validating admission webhook — single-node cluster, the
    # extra deployment + cert lifecycle is unnecessary overhead.
    webhook:
      enabled: false
      # VolumeSnapshotClass definitions live with the CSI driver that owns them
      # — see kubernetes/apps/kube-system/democratic-csi/app/volumesnapshotclass.yaml.
      # Defining them here would race against the CRDs this chart installs.
