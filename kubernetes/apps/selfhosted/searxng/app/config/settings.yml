---
use_default_settings:
  engines:
    # Tor-only engines (auto-inactive without a Tor proxy)
    # and the sqlite-race-broken radio browser in 2026.6.5.
    remove:
      - ahmia
      - torch
      - radio browser

server:
  limiter: false
  image_proxy: true
  method: GET

search:
  safe_search: 0
  autocomplete: duckduckgo
  favicon_resolver: duckduckgo
  default_lang: ""
  languages:
    - all
    - en
    - en-US
    - hu
    - hu-HU
  formats:
    - html
    - json
  max_page: 20

outgoing:
  request_timeout: 5.0
  useragent_suffix: "home-ops"

general:
  instance_name: zhorvath83's Search

ui:
  default_theme: simple
  infinite_scroll: true
  query_in_title: true
  results_on_new_tab: true
  static_use_hash: true
  theme_args:
    simple_style: auto

categories_as_tabs:
  general:
  images:
  videos:
  news:
  map:
  it:

enabled_plugins:
  - Basic Calculator
  - Hash plugin
  - Open Access DOI rewrite
  - Self Informations
  - Tracker URL remover
  - Unit converter plugin

hostnames:
  high_priority:
    - (.*)\/blog\/(.*)
    - (.*\.)?wikipedia.org$
    - (.*\.)?github.com$
    - (.*\.)?reddit.com$
    - (.*\.)?docker.com$
    - (.*\.)?archlinux.org$
    - (.*\.)?stackoverflow.com$
    - (.*\.)?askubuntu.com$
    - (.*\.)?superuser.com$
    - (.*\.)?hwsw\.hu$
    - (.*\.)?prohardver\.hu$
    - (.*\.)?mobilarena\.hu$
    - (.*\.)?telex\.hu$
    - (.*\.)?444\.hu$
    - (.*\.)?hvg\.hu$
    - (.*\.)?portfolio\.hu$
    - (.*\.)?gov\.hu$
  low_priority:
    - (.*\.)?pinterest\.com$
    - (.*\.)?quora\.com$
