---
use_default_settings: true

server:
  limiter: false
  image_proxy: true
  method: GET

search:
  safe_search: 0
  autocomplete: duckduckgo
  favicon_resolver: duckduckgo
  default_lang: ""
  # `json` required by open-webui's RAG web search integration.
  formats:
    - html
    - json
  max_page: 20

outgoing:
  # Default 3.0s; slower engines (Mojeek/Brave) often time out on home internet.
  request_timeout: 5.0
  useragent_suffix: "home-ops"

general:
  instance_name: SearXNG

ui:
  default_theme: simple
  infinite_scroll: true
  query_in_title: true
  results_on_new_tab: true
  static_use_hash: true
  theme_args:
    simple_style: auto

categories_as_tabs:
  general:
  images:
  videos:
  news:
  map:
  it:

enabled_plugins:
  - Basic Calculator
  - Hash plugin
  - Open Access DOI rewrite
  - Self Informations
  - Tracker URL remover
  - Unit converter plugin

hostnames:
  # Ranking boost; does NOT filter — English results still surface.
  high_priority:
    - (.*)\/blog\/(.*)
    - (.*\.)?wikipedia\.org$
    - (.*\.)?telex\.hu$
    - (.*\.)?444\.hu$
    - (.*\.)?hvg\.hu$
    - (.*\.)?index\.hu$
    - (.*\.)?nyest\.hu$
    - (.*\.)?gov\.hu$
    - (.*\.)?nemzetiarchivum\.hu$
  low_priority:
    - (.*\.)?pinterest\.com$
    - (.*\.)?quora\.com$

engines:
  # Tor-only engines: auto-disable themselves at init without a Tor proxy.
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
  # Broken in 2026.6.5 (sqlite cache init race): "no such table: properties".
  - name: radio browser
    disabled: true
