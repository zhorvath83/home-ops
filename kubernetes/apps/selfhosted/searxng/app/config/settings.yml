---
use_default_settings: true

server:
  limiter: false
  image_proxy: true
  method: GET

search:
  safe_search: 0
  autocomplete: duckduckgo
  favicon_resolver: duckduckgo
  default_lang: ""
  # `json` required by open-webui's RAG web search integration.
  formats:
    - html
    - json

general:
  instance_name: SearXNG

ui:
  default_theme: simple
  infinite_scroll: true
  query_in_title: true
  results_on_new_tab: true
  static_use_hash: true
  theme_args:
    simple_style: auto

categories_as_tabs:
  general:
  images:
  videos:
  news:
  map:
  it:

enabled_plugins:
  - Basic Calculator
  - Hash plugin
  - Open Access DOI rewrite
  - Self Informations
  - Tracker URL remover
  - Unit converter plugin

hostnames:
  high_priority:
    - (.*)\/blog\/(.*)
    - (.*\.)?wikipedia.org$

engines:
  # Tor-only engines: auto-disable themselves at init without a Tor proxy.
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
  # Broken in 2026.6.5 (sqlite cache init race): "no such table: properties".
  - name: radio browser
    disabled: true
