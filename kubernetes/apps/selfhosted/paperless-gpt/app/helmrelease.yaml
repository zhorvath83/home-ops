---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-gpt
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-internal (ingress-from-gateway-internal CCNP) + custom-egress (Mistral API/OCR + in-cluster Paperless via per-app CNP; V5 narrow-world)
      labels:
        ingress.home.arpa/allow-gateway-internal: "true"
        egress.home.arpa/custom-egress: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      paperless-gpt:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/icereed/paperless-gpt
              repository: ghcr.io/icereed/paperless-gpt
              tag: v0.27.0@sha256:855d9df5bacb2bed60bd520f1ffe0d118695aef9f77d37466ae85823001f547d
            # bypass the root-requiring entrypoint (adduser/chown/su-exec); run the binary directly as UID 10001
            command:
              - /app/paperless-gpt
            env:
              # Paperless-ngx connection
              PAPERLESS_BASE_URL: "http://paperless.selfhosted.svc.cluster.local:8000"
              PAPERLESS_PUBLIC_URL: "https://documents.${PUBLIC_DOMAIN}"
              # Auto processing settings
              AUTO_GENERATE_TITLE: "true"
              AUTO_GENERATE_TAGS: "true"
              CREATE_NEW_TAGS: "false"
              AUTO_GENERATE_DOCUMENT_TYPE: "true"
              AUTO_GENERATE_CORRESPONDENTS: "true"
              AUTO_GENERATE_CREATED_DATE: "true"
              AUTO_OCR_TAG: "AI-OCR"
              AUTO_TAG: "AI-processing"
              AUTO_TAG_COMPLETE: ""
              # PDF_OCR_TAGGING: "true"
              # PDF_OCR_COMPLETE_TAG: "Inbox"

              # Logging
              LOG_LEVEL: "info"
              # OCR Provider (Mistral dedicated OCR service)
              OCR_PROVIDER: "mistral_ocr"
              MISTRAL_MODEL: "mistral-ocr-latest"
              OCR_PROCESS_MODE: "whole_pdf" # "whole_pdf" or "image" or "pdf"
              PDF_SKIP_EXISTING_OCR: "false"
              OCR_LIMIT_PAGES: "0"
              # LLM Provider (for title/tag/correspondent generation)
              LLM_LANGUAGE: "Hungarian"
              LLM_PROVIDER: "mistral"
              LLM_MODEL: "mistral-large-latest"
              TOKEN_LIMIT: "5000"
            envFrom:
              - secretRef:
                  name: paperless-gpt-secret
            probes:
              startup:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 1m
                memory: 16Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: paperless-gpt
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Paperless-GPT
          gethomepage.dev/group: Selfhosted
          gethomepage.dev/icon: mistral-ai.svg
        hostnames:
          - "paperless-gpt.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: paperless-gpt
        advancedMounts:
          paperless-gpt:
            app:
              - path: /app/db
                subPath: db
              - path: /app/prompts
                subPath: prompts
      tmpfs:
        type: emptyDir
        advancedMounts:
          paperless-gpt:
            app:
              - path: /app/config
                subPath: config
              - path: /tmp
                subPath: tmp
