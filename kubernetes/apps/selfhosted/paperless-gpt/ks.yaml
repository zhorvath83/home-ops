---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless-gpt
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless-gpt
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: onepassword-connect
      namespace: external-secrets
    - name: democratic-csi
      namespace: kube-system
    - name: paperless
  interval: 1h
  path: ./kubernetes/apps/selfhosted/paperless-gpt/app
  postBuild:
    substitute:
      APP: paperless-gpt
      VOLSYNC_SOURCE_NS: default
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
