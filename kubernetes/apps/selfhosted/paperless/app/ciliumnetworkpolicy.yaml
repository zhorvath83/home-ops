---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# paperless (AD-023): sqlite + localhost valkey sidecar, no in-cluster or world egress (DNS via the cluster-wide allow-dns-egress CCNP).
# Ingress from both envoy gateways via the ingress-from-gateway-external + -internal CCNPs; this CNP keeps only the paperless-gpt named-consumer east-west rule. Opt-out labels scoped to the main pod (backup CronJob stays on baseline egress).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: paperless
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: paperless
      app.kubernetes.io/instance: paperless
      app.kubernetes.io/controller: paperless
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: selfhosted
            app.kubernetes.io/name: paperless-gpt
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
