---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/_/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-gallery
# Standalone PVC (not components/volsync) — intentionally excluded from VolSync
# backups: this PVC only stores regenerable thumbnails and the local app
# database, while the source photos live on NFS (covered by resticprofile).
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: democratic-csi-local-hostpath
