---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pingvin-share-x
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed ingress (allow-gateway-external + -internal); custom-egress (no egress needs of its own) +
      # allow-gateways for the public-issuer OIDC hairpin (allow-gateways-egress CCNP).
      labels:
        ingress.home.arpa/allow-gateway-external: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
        egress.home.arpa/custom-egress: "true"
        egress.home.arpa/allow-gateways: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      pingvin-share-x:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          config-init:
            image:
              repository: docker.io/nginx
              tag: "stable-alpine"
            command:
              - "/bin/sh"
              - -c
              - envsubst < /config-template/config.yaml > /config/config.yaml
            envFrom:
              - secretRef:
                  name: pingvin-share-x-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image:
              repository: ghcr.io/smp46/pingvin-share-x
              tag: v1.21.2@sha256:c881b09f0f2b01120cd50dc52bbf3d9ab4def8c1cbef9aab3f6df159644ae24e
            env:
              TZ: ${TIMEZONE}
              CADDY_DISABLED: "true"
              TRUST_PROXY: "true"
              DATA_DIRECTORY: /data
              CONFIG_FILE: /config/config.yaml
              DATABASE_URL: file:/data/pingvin-share.db?connection_limit=1
              PV_LOG_LEVEL: verbose
            probes:
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: pingvin-share-x
        ports:
          http:
            port: &frontendPort 3333
          api:
            port: &backendPort 8080
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Pingvin Share
          gethomepage.dev/group: Selfhosted
          gethomepage.dev/icon: pingvin-share
        hostnames:
          - "share.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: *frontendPort
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            backendRefs:
              - identifier: app
                port: *backendPort
    persistence:
      config-template:
        type: configMap
        name: pingvin-share-x-config
        advancedMounts:
          pingvin-share-x:
            config-init:
              - path: /config-template
      config:
        type: emptyDir
        advancedMounts:
          pingvin-share-x:
            config-init:
              - path: /config
            app:
              - path: /config
      data:
        existingClaim: pingvin-share-x
        advancedMounts:
          pingvin-share-x:
            app:
              - path: /data
      frontend-img:
        existingClaim: pingvin-share-x
        advancedMounts:
          pingvin-share-x:
            app:
              - path: /opt/app/frontend/public/img
                subPath: images
