---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
#
# Egress is fully restricted. The pod opts out of the cluster-wide baseline
# egress CCNP via the egress.home.arpa/custom-egress label. DNS is covered by
# the cluster-wide allow-dns-egress CCNP (endpointSelector: {}). No other
# outbound traffic is permitted. Add egress rules for SMTP or OAuth providers
# if those features are enabled.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pingvin-share-x
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: pingvin-share-x
      app.kubernetes.io/instance: pingvin-share-x
      app.kubernetes.io/controller: pingvin-share-x
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: networking
          matchExpressions:
            - key: gateway.networking.k8s.io/gateway-name
              operator: In
              values:
                - envoy-external
                - envoy-internal
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
