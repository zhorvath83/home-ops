---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# homepage ingress-only (AD-023 Class A): the dashboard aggregates external widget APIs (GitHub releases, OpenWeatherMap, …) plus the k8s API; its egress set is user-config-driven (services.yaml from 1Password), so it rides baseline egress rather than a brittle allowlist.
# East-west containment is still enforced target-side by this ingress rule. Ingress: the external/internal Envoy gateways only; kubelet probes ride the local-host fast-path.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: homepage
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: homepage
      app.kubernetes.io/instance: homepage
      app.kubernetes.io/controller: homepage
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: networking
          matchExpressions:
            - key: gateway.networking.k8s.io/gateway-name
              operator: In
              values:
                - envoy-external
                - envoy-internal
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
