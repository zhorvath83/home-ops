---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# homepage no-world (AD-023): dashboard with the cluster-mode Kubernetes widget (backend: kubernetes).
# Ingress: the external/internal Envoy gateways only; kubelet probes ride the local-host fast-path (no rule needed).
# Egress: kube-apiserver only (the k8s widget lists namespaces/pods/nodes/ingresses/httproutes per its ClusterRole); DNS via the cluster-wide allow-dns-egress CCNP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: homepage
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: homepage
      app.kubernetes.io/instance: homepage
      app.kubernetes.io/controller: homepage
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: networking
          matchExpressions:
            - key: gateway.networking.k8s.io/gateway-name
              operator: In
              values:
                - envoy-external
                - envoy-internal
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
