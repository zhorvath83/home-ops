---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# actual (AD-023): file-based budget DB; envoy ingress via the ingress-from-gateway-external + -internal CCNPs.
# Egress: only the enablebanking.com open-banking API for bank transaction fetch (DNS via the cluster-wide allow-dns-egress CCNP).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: actual
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: actual
      app.kubernetes.io/instance: actual
      app.kubernetes.io/controller: actual
  egress:
    # enablebanking.com open-banking API for bank transaction fetch.
    - toFQDNs:
        - matchName: "enablebanking.com"
        - matchPattern: "*.enablebanking.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
