---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# actual (AD-023): file-based budget DB, no in-cluster or world egress except the enablebanking.com open-banking API (DNS via the cluster-wide allow-dns-egress CCNP).
# Ingress: the external/internal Envoy gateways only; kubelet probes ride the local-host fast-path (no rule needed).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: actual
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: actual
      app.kubernetes.io/instance: actual
      app.kubernetes.io/controller: actual
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: networking
          matchExpressions:
            - key: gateway.networking.k8s.io/gateway-name
              operator: In
              values:
                - envoy-external
                - envoy-internal
      toPorts:
        - ports:
            - port: "5006"
              protocol: TCP
  egress:
    # enablebanking.com open-banking API for bank transaction fetch.
    - toFQDNs:
        - matchName: "enablebanking.com"
        - matchPattern: "*.enablebanking.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
