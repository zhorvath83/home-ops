---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: k8s-gateway
  values:
    domain: "${PUBLIC_DOMAIN}"
    ttl: 300
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities: {drop: ["ALL"]}
      seccompProfile:
        type: RuntimeDefault
    watchedResources:
      - HTTPRoute
    filters:
      gatewayClasses:
        - envoy-internal
    podAnnotations:
      reloader.stakater.com/auto: "true"
    service:
      type: LoadBalancer
      loadBalancerIP: "${K8S_GATEWAY_IP}"
      externalTrafficPolicy: Local
      useTcp: true
    replicaCount: 1
    resources:
      requests:
        cpu: 5m
        memory: 24Mi
      limits:
        memory: 128Mi
