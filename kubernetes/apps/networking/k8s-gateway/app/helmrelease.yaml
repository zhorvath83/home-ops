---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
  namespace: networking
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: k8s-gateway

  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    domain: "${PUBLIC_DOMAIN}"
    ttl: 300
    watchedResources:
      - HTTPRoute
    filters:
      gatewayClasses:
        - envoy-internal

    podAnnotations:
      reloader.stakater.com/auto: "true"

    service:
      type: LoadBalancer
      loadBalancerIP: "${LB_K8S_GATEWAY_IP}"
      externalTrafficPolicy: Local
      useTcp: true

    replicaCount: 1

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
