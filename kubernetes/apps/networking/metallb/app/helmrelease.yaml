---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: networking
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: metallb

  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    # Chart defaults: controller=runAsNonRoot+drop ALL+readOnlyRootFS but NO seccompProfile.
    # Speaker requires NET_RAW/NET_ADMIN/SYS_ADMIN capabilities by design (FRR routing).
    # Adding seccompProfile to controller pod explicitly.
    crds:
      enabled: true
    controller:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 5m
          memory: 100Mi
        limits:
          memory: 256Mi
    speaker:
      # The speaker pod includes FRR sidecars and init containers, so define
      # resources for each chart-managed container instead of relying on zeros.
      resources:
        requests:
          cpu: 3m
          memory: 100Mi
        limits:
          memory: 384Mi
      frr:
        resources:
          requests:
            cpu: 1m
            memory: 50Mi
          limits:
            memory: 128Mi
      reloader:
        resources:
          requests:
            cpu: 1m
            memory: 1Mi
          limits:
            memory: 32Mi
      frrMetrics:
        resources:
          requests:
            cpu: 1m
            memory: 20Mi
          limits:
            memory: 64Mi

      initContainers:
        cpFrrFiles:
          resources:
            limits:
              memory: 256Mi
        cpReloader:
          resources:
            limits:
              memory: 256Mi
        cpMetrics:
          resources:
            limits:
              memory: 256Mi

      tolerations:
        - effect: "NoExecute"
          operator: "Exists"
        - effect: "NoSchedule"
          operator: "Exists"
