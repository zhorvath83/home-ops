---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  interval: 15m

  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false

  values:
    # Chart defaults: seccompProfile, runAsNonRoot, drop ALL, noPrivEscalation
    global:
      imageRegistry: mirror.gcr.io

    config:
      envoyGateway:
        extensionApis:
          enableEnvoyPatchPolicy: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace

    deployment:
      envoyGateway:
        resources:
          requests:
            cpu: 5m
            memory: 192Mi
          limits:
            memory: 1024Mi
