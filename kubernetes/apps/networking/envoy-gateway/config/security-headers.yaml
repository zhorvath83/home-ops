---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.envoyproxy.io/envoyextensionpolicy_v1alpha1.json
# Baseline security response headers. v1.8.1 has no native gateway-level
# response-header injection, hence the inline Lua. HSTS preload intentionally
# omitted (one-way browser-registry commitment).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: security-response-headers
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-internal
  lua:
    - type: Inline
      # HSTS and nosniff are replaced (gateway-authoritative); Referrer-Policy
      # is only added when absent so an app can supply a stricter value.
      inline: |-
        function envoy_on_response(response_handle)
          local headers = response_handle:headers()
          headers:replace("strict-transport-security", "max-age=63072000; includeSubDomains")
          headers:replace("x-content-type-options", "nosniff")
          if headers:get("referrer-policy") == nil then
            headers:add("referrer-policy", "strict-origin-when-cross-origin")
          end
        end
