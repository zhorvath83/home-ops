---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-external
  namespace: networking
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.37.1
          # imageRepository: mirror.gcr.io/envoyproxy/envoy
          resources:
            requests:
              memory: 96Mi
              cpu: 10m
            limits:
              memory: 1Gi
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                    - name: shutdown-manager
                      resources:
                        requests:
                          cpu: 5m
                          memory: 32Mi
                        limits:
                          memory: 64Mi
      envoyService:
        type: ClusterIP
  shutdown:
    drainTimeout: 90s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Zstd
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-internal
  namespace: networking
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.37.1
          # imageRepository: mirror.gcr.io/envoyproxy/envoy
          resources:
            requests:
              memory: 96Mi
              cpu: 10m
            limits:
              memory: 1Gi
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                    - name: shutdown-manager
                      resources:
                        requests:
                          cpu: 5m
                          memory: 32Mi
                        limits:
                          memory: 64Mi
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Local
  shutdown:
    drainTimeout: 90s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Zstd
