---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: envoy-internal
  namespace: networking
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: envoy
      gateway.envoyproxy.io/owning-gateway-name: envoy-internal
  ingress:
    # HTTP and HTTPS listener traffic. LAN clients arrive through the Cilium
    # L2 announced LB IP and reach the pod with the original client IP
    # preserved (externalTrafficPolicy: Local). LAN-only enforcement is
    # delegated to SecurityPolicy/envoy-internal-rfc1918 at the listener level,
    # so accept world + cluster here.
    - fromEntities:
        - world
        - cluster
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "10080"
              protocol: TCP
            - port: "10443"
              protocol: TCP
        - ports:
            - port: "10443"
              protocol: UDP
    # Prometheus scrape of the envoy admin metrics port.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "19001"
              protocol: TCP
    # Kubelet readiness probe (host network).
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "19003"
              protocol: TCP
  egress:
    # CoreDNS.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    # In-cluster traffic to HTTPRoute backends and xDS upstream
    # (envoy-gateway controller, services in any namespace).
    - toEntities:
        - cluster
    # Kubernetes API server.
    - toEntities:
        - kube-apiserver
    # Outbound HTTPS for HTTPRoute backends that target external services.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
