---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "horvathzoltan-me"
  namespace: networking
spec:
  dnsNames:
    - "horvathzoltan.me"
    - "*.horvathzoltan.me"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: "horvathzoltan-me"
  usages:
    - digital signature
