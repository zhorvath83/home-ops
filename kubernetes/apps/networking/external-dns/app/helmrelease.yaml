---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: external-dns
  values:
    # Chart defaults: seccompProfile=RuntimeDefault, runAsNonRoot, readOnlyRootFS, drop ALL.
    interval: 2m
    logLevel: debug
    provider:
      name: cloudflare
    env:
      - name: TZ
        value: "${TIMEZONE}"
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-secret
            key: api-token
    extraArgs:
      - --cloudflare-proxied
      - --gateway-name=envoy-external
    policy: sync
    sources:
      - ingress
      - gateway-httproute
    txtPrefix: k8s.
    txtOwnerId: default
    domainFilters:
      - "${PUBLIC_DOMAIN}"
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: external-dns-secret
    # AD-023 vocabulary: internet egress (Cloudflare API) via the allow-world-egress CCNP
    podLabels:
      egress.home.arpa/allow-world: "true"
    resources:
      requests:
        cpu: 5m
        memory: 48Mi
      limits:
        memory: 384Mi
