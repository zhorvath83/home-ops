---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # AD-023 vocabulary: envoy-routed (gateways) + prometheus scrape (ServiceMonitor)
      labels:
        ingress.home.arpa/gateways: "true"
        ingress.home.arpa/allow-gateway-external: "true"
        ingress.home.arpa/allow-gateway-internal: "true"
        ingress.home.arpa/prometheus: "true"
        ingress.home.arpa/allow-prometheus: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      echo:
        type: deployment
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/echo
              tag: 0.2.1@sha256:89e18bc031f50b5fc706a4fc85007f4d44635762146d4f16f49d993fcfde2e39
            env:
              ECHO_HTTP_PORT: &httpPort 8080
              ECHO_METRICS_PORT: &metricsPort 8081
              ECHO_TRUSTED_PROXIES: "${POD_CIDR}"
              ECHO_METRICS_ENABLED: "true"
              ECHO_LOG_LEVEL: info
              ECHO_LOG_FORMAT: json
              ECHO_PRETTY_PRINT: "true"
              ECHO_KUBERNETES: "true"
              ECHO_POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              ECHO_POD_NAMESPACE:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              ECHO_POD_IP:
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              ECHO_NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *httpPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *httpPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *httpPort
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 96Mi

    service:
      app:
        controller: echo
        ports:
          http:
            port: *httpPort
          metrics:
            port: *metricsPort

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Echo
          gethomepage.dev/group: Observability
          gethomepage.dev/icon: terminal.svg
        hostnames:
          - "{{ .Release.Name }}.${PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort

    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s
