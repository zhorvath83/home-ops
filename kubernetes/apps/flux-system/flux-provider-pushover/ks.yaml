---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-provider-pushover
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux-provider-pushover
  dependsOn:
    - name: onepassword-connect
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/flux-system/flux-provider-pushover/app
  postBuild:
    substitute:
      APP_UID: "65532"
      APP_GID: "65532"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: flux-system
  timeout: 5m
  wait: false
