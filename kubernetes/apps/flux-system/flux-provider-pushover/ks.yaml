---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-provider-pushover
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux-provider-pushover
  dependsOn:
    - name: onepassword-store
  path: ./kubernetes/apps/flux-system/flux-provider-pushover/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  targetNamespace: flux-system
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP_UID: "65532"
      APP_GID: "65532"
