---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
# tuppr (AD-023 V5): custom-egress opt-out, so this CNP is the sole egress source — factory.talos.dev (installer image
# availability check) + kube-apiserver, which on this single node also carries the Talos apid (50000, kubernetesTalosAPIAccess)
# alongside the K8s API (6443). DNS via the cluster-wide allow-dns-egress CCNP. Ingress is left default-open on purpose: the
# admission webhook (:9443) and kubelet probes (:8081) arrive as the kube-apiserver identity, so an ingress label would also
# require an explicit apiserver ingress grant — not worth the webhook-breakage risk for a cluster-internal operator.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tuppr
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tuppr
      app.kubernetes.io/instance: tuppr
  egress:
    # Talos Image Factory — installer image availability check before the node upgrade.
    - toFQDNs:
        - matchName: "factory.talos.dev"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # kube-apiserver identity — Kubernetes API (6443) + Talos apid (50000) both resolve to it on the single node.
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "50000"
              protocol: TCP
