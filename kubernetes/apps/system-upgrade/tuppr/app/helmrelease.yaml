---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tuppr
  # The chart creates a Talos ServiceAccount (talos.dev/v1alpha1, kind:
  # ServiceAccount, spec.roles: [os:admin]) whose CRD is only installed when
  # the Talos machine config enables kubernetesTalosAPIAccess. See
  # kubernetes/talos/machineconfig.yaml.j2 — machine.features.kubernetesTalosAPIAccess
  # must be enabled with allowedRoles:[os:admin] and
  # allowedKubernetesNamespaces:[system-upgrade]
  values:
    replicaCount: 1
    image:
      # renovate: datasource=docker depName=ghcr.io/home-operations/tuppr
      tag: 0.2.1
    # AD-023 V5: custom-egress opt-out; the per-app ciliumnetworkpolicy.yaml is the sole egress source (factory.talos.dev + kube-apiserver).
    podLabels:
      egress.home.arpa/custom-egress: "true"
    monitoring:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: false
