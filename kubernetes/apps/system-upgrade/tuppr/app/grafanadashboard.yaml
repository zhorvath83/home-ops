---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
# The tuppr chart emits this dashboard ConfigMap (monitoring.dashboards.enabled);
# referenced here by name so the operator imports it.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: tuppr
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  allowCrossNamespaceImport: true
  folderRef: system-upgrade
  configMapRef:
    name: tuppr-dashboard
    key: tuppr.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
